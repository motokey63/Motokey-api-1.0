<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MotoKey — Application Complète</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f12;--bg2:#141618;--bg3:#1c1f23;--bg4:#22262c;
  --bd:#2a2d32;--bd2:#353a42;
  --tx:#e8eaed;--tx2:#8b9199;--tx3:#555c66;
  --acc:#ff6b00;--acc2:#ff8c33;
  --gn:#22c55e;--gnbg:rgba(34,197,94,.1);--gnbd:rgba(34,197,94,.28);
  --bl:#3b82f6;--blbg:rgba(59,130,246,.1);--blbd:rgba(59,130,246,.28);
  --yw:#eab308;--ywbg:rgba(234,179,8,.1);--ywbd:rgba(234,179,8,.28);
  --rd:#ef4444;--rdbg:rgba(239,68,68,.1);--rdbd:rgba(239,68,68,.28);
  --or:#f97316;--orbg:rgba(249,115,22,.1);
  --pu:#a855f7;--pubg:rgba(168,85,247,.1);--pubd:rgba(168,85,247,.28);
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx)}
input,select,textarea{font-family:'Barlow',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* ── TOPBAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:100;
  background:var(--bg);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 18px;gap:12px;
}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:1px}
.logo em{color:var(--acc);font-style:normal}
.vsep{width:1px;height:18px;background:var(--bd)}
.vtabs{display:flex;gap:5px}
.vtab{padding:6px 14px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .2s;letter-spacing:.5px;text-transform:uppercase}
.vtab.gar{background:rgba(255,107,0,.15);color:var(--acc)}
.vtab.gar.on{background:var(--acc);color:#fff}
.vtab.cli{background:var(--bg3);color:var(--tx3);border:1px solid var(--bd)}
.vtab.cli.on{background:#fff;color:#1a1714}
.bar-end{margin-left:auto;display:flex;align-items:center;gap:10px}
.livepill{display:flex;align-items:center;gap:6px;background:var(--gnbg);border:1px solid var(--gnbd);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;color:var(--gn)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--gn);animation:pu 1.5s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.2}}
.msel{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:5px 9px;color:var(--tx);font-size:12px;outline:none;cursor:pointer}

/* ── APP SHELL ── */
#garageWrap{
  position:fixed;top:52px;left:0;right:0;bottom:0;
  display:flex;
}
#clientWrap{
  position:fixed;top:52px;left:0;right:0;bottom:0;
  display:none;
  justify-content:center;
  background:var(--bg);
  overflow-y:auto;
}

/* ── SIDEBAR ── */
#sidebar{
  width:205px;flex-shrink:0;background:var(--bg2);
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;overflow-y:auto;
}
.snav{padding:10px 8px;flex:1}
.snav-sec{font-size:9px;color:var(--tx3);letter-spacing:3px;text-transform:uppercase;padding:12px 8px 5px}
.snav-btn{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;
  cursor:pointer;font-size:13px;color:var(--tx2);font-weight:500;
  transition:all .15s;border:none;background:none;width:100%;text-align:left;
}
.snav-btn:hover{background:var(--bg3);color:var(--tx)}
.snav-btn.on{background:rgba(255,107,0,.15);color:var(--acc)}
.snav-btn svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2}
.nbadge{margin-left:auto;color:#fff;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700}
.sfoot{padding:12px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.savatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--acc),#c43d00);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}

/* ── MAIN PANEL ── */
#mainPanel{flex:1;overflow-y:auto;overflow-x:hidden}
.pw{padding:22px;min-height:100%}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.ptitle{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:.5px}
.psub{font-size:12px;color:var(--tx3);margin-top:2px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px}
.cclick{cursor:pointer;transition:all .2s}
.cclick:hover{border-color:var(--bd2);background:var(--bg3);transform:translateY(-1px)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border-radius:7px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;transition:all .2s;white-space:nowrap;text-decoration:none}
.bpri{background:var(--acc);color:#fff}.bpri:hover{background:var(--acc2)}
.bgre{background:var(--gn);color:#fff}.bgre:hover{background:#16a34a}
.bgho{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd)}.bgho:hover{color:var(--tx)}
.bred{background:var(--rdbg);color:var(--rd);border:1px solid var(--rdbd)}.bred:hover{background:var(--rd);color:#fff}
.bsm{padding:5px 11px;font-size:11px}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

/* Form */
.fg{margin-bottom:13px}
.fl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;display:block}
.fi{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:8px 11px;color:var(--tx);font-size:13px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--acc)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fsel{appearance:none;cursor:pointer}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.tgn{background:var(--gnbg);color:var(--gn)}
.tbl{background:var(--blbg);color:var(--bl)}
.tyw{background:var(--ywbg);color:var(--yw)}
.trd{background:var(--rdbg);color:var(--rd)}
.tor{background:var(--orbg);color:var(--or)}
.tpu{background:var(--pubg);color:var(--pu)}

/* Stats */
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:15px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.sg::before{background:var(--gn)}.sc.sb::before{background:var(--bl)}
.sc.sy::before{background:var(--yw)}.sc.sr::before{background:var(--rd)}
.sc-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:2px;margin-bottom:7px}
.sc-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;line-height:1}
.sc.sg .sc-val{color:var(--gn)}.sc.sb .sc-val{color:var(--bl)}
.sc.sy .sc-val{color:var(--yw)}.sc.sr .sc-val{color:var(--rd)}
.sc-sub{font-size:11px;color:var(--tx3);margin-top:4px}

/* Moto rows */
.mgrid{display:grid;gap:9px}
.mrow{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  display:grid;grid-template-columns:40px 1fr 110px 90px 150px 12px;
  align-items:center;gap:13px;padding:12px 15px;
  cursor:pointer;transition:all .2s;
}
.mrow:hover{border-color:var(--acc);background:var(--bg3)}
.micon{width:38px;height:38px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:19px}
.mname{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700}
.mmeta{font-size:11px;color:var(--tx3);margin-top:2px}
.mplate{background:var(--bg3);border:1px solid var(--bd);padding:4px 9px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px}
.mkm{text-align:right}
.mkmv{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700}
.mkml{font-size:10px;color:var(--tx3)}
.swrap{display:flex;flex-direction:column;gap:4px;min-width:130px}
.sbarbg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.sbarfill{height:100%;border-radius:2px;transition:width .6s}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Detail grid */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.dbox{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:13px}
.dblbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
.dbval{font-size:14px;font-weight:600}
.sbig{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:15px;grid-column:span 2;display:flex;align-items:center;gap:15px}
.scirc{width:64px;height:64px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;border:3px solid;flex-shrink:0}
.scn{font-size:22px;font-weight:900;line-height:1}
.scl{font-size:9px;letter-spacing:1px;text-transform:uppercase}
.bdi{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bdd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bdl{font-size:12px;color:var(--tx2);flex:1}
.bdb{width:70px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.bdf{height:100%;border-radius:2px}
.bdp{font-size:11px;font-weight:700;width:32px;text-align:right}

/* History */
.htl{position:relative;padding-left:20px}
.htl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--bd)}
.hitem{position:relative;margin-bottom:12px}
.hdot{position:absolute;left:-18px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg2)}
.hcard{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:11px 13px}
.hch{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.hct{font-size:13px;font-weight:600}
.hcd{font-size:11px;color:var(--tx3)}
.hcf{display:flex;align-items:center;justify-content:space-between;margin-top:7px}

/* Op cards */
.opcard{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:9px;cursor:pointer;transition:all .2s}
.opcard:hover{border-color:var(--bd2)}
.opcard.urgent{border-left:3px solid var(--rd)}
.opcard.warning{border-left:3px solid var(--yw)}
.opcard.ok{border-left:3px solid var(--gn)}
.opcard.future{border-left:3px solid var(--bd2);opacity:.65}
.opiconw{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.oppbg{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.oppf{height:100%;border-radius:2px;transition:width .8s}

/* Slider */
.kslider{width:100%;appearance:none;height:5px;border-radius:3px;background:var(--bd2);outline:none;cursor:pointer}
.kslider::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 2px 8px rgba(255,107,0,.3)}

/* Devis table */
.dvhead{display:grid;grid-template-columns:26px 1fr 80px 60px 68px 70px 80px 28px;gap:7px;padding:6px 11px;background:var(--bg3);border-radius:7px 7px 0 0;margin-bottom:2px}
.dvhc{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.dvhc.r{text-align:right}
.dvrow{display:grid;grid-template-columns:26px 1fr 80px 60px 68px 70px 80px 28px;gap:7px;padding:8px 11px;background:var(--bg2);border:1px solid var(--bd);border-radius:7px;margin-bottom:5px;align-items:center}
.dvrow:hover{border-color:var(--bd2)}
.dvrow.dv-g{border-color:var(--gnbd);background:var(--gnbg)}
.dvrow.dv-r{border-color:var(--rdbd);background:var(--rdbg)}
.ci{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:4px 6px;color:var(--tx);font-size:12px;width:100%;outline:none;text-align:right}
.ci:focus{border-color:var(--acc)}
.ci.cig{border-color:var(--gnbd);color:var(--gn);font-weight:700}
.ci.cir{border-color:var(--rdbd);color:var(--rd);font-weight:700}
.ribtn{width:14px;height:14px;border-radius:3px;border:none;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.ribtn.g{background:var(--gnbg);color:var(--gn)}.ribtn.g:hover{background:var(--gn);color:#fff}
.ribtn.r{background:var(--rdbg);color:var(--rd)}.ribtn.r:hover{background:var(--rd);color:#fff}
.ribtn.x{background:var(--bg3);color:var(--tx3)}.ribtn.x:hover{background:var(--rd);color:#fff}
.rrow{display:flex;align-items:center;gap:7px;padding:4px 11px 7px;margin-top:-3px}
.rin{flex:1;border:1px solid;border-radius:6px;padding:5px 9px;font-size:11px;outline:none;font-family:'Barlow',sans-serif}

/* Total card */
.tcal{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-top:14px}
.tcrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px}
.tcrow:last-child{border:none;padding-top:13px}
.tclbl{color:var(--tx2)}
.tcval{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700}
.tcrow.tcg{background:var(--gnbg);border-radius:6px;padding:7px 9px;border:none;margin:3px 0}
.tcrow.tcg .tclbl{color:var(--gn)}.tcrow.tcg .tcval{color:var(--gn)}
.tcrow.tcr{background:var(--rdbg);border-radius:6px;padding:7px 9px;border:none;margin:3px 0}
.tcrow.tcr .tclbl{color:var(--rd)}.tcrow.tcr .tcval{color:var(--rd)}
.ttcblock{background:var(--bg);border-radius:10px;padding:18px;text-align:center;margin-top:13px}
.ttclbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px}
.ttcht{font-size:12px;color:var(--tx3);margin-bottom:3px}
.ttcv{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900}
.ttctva{font-size:11px;color:var(--tx3);margin-top:3px}

/* Fraud steps */
.fstep{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:13px;transition:all .3s;margin-bottom:8px}
.fstep.running{border-color:var(--ywbd);background:var(--ywbg)}
.fstep.done{border-color:var(--gnbd);background:var(--gnbg)}
.fstep.failed{border-color:var(--rdbd);background:var(--rdbg)}
.fstep.warn{border-color:var(--ywbd);background:var(--ywbg)}
.fsi{font-size:21px;width:28px;text-align:center}
.fsinfo{flex:1}
.fst{font-size:13px;font-weight:600}
.fsd{font-size:11px;color:var(--tx2);margin-top:2px}
.fsst{width:25px;height:25px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.fsst.spin{animation:sp .8s linear infinite;border-top-color:var(--yw);border-color:var(--bd2)}
@keyframes sp{to{transform:rotate(360deg)}}
.fsst.ok{background:var(--gn);border-color:var(--gn);color:#fff}
.fsst.fail{background:var(--rd);border-color:var(--rd);color:#fff}
.fsst.warn{background:var(--yw);border-color:var(--yw);color:#000}

/* Trust */
.thero{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:20px;display:flex;align-items:center;gap:20px;margin-bottom:14px}
.tcirc{position:relative;width:96px;height:96px;flex-shrink:0}
.tcirc svg{transform:rotate(-90deg)}
.tnw{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.tpct{font-family:'Barlow Condensed',sans-serif;font-size:25px;font-weight:900;line-height:1}
.tlbl{font-size:9px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase}
.tverd{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;margin-bottom:5px}
.tsub{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:9px}

/* Transfer steps */
.tsteps{display:grid;grid-template-columns:repeat(5,1fr);gap:0;margin-bottom:20px}
.tsitem{display:flex;flex-direction:column;align-items:center;position:relative}
.tsitem::before{content:'';position:absolute;top:14px;left:50%;right:-50%;height:2px;background:var(--bd);z-index:0}
.tsitem:last-child::before{display:none}
.tsitem.ts-done::before{background:var(--gn)}
.tsdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;z-index:1;transition:all .3s;border:2px solid var(--bd);background:var(--bg3);color:var(--tx3)}
.tsdot.ts-done{background:var(--gn);border-color:var(--gn);color:#fff}
.tsdot.ts-active{background:var(--acc);border-color:var(--acc);color:#fff;box-shadow:0 0 0 4px rgba(255,107,0,.2)}
.tslbl{font-size:10px;color:var(--tx3);margin-top:4px;text-align:center;max-width:72px;line-height:1.3}
.tslbl.ts-active{color:var(--acc)}.tslbl.ts-done{color:var(--gn)}

/* Code */
.codedisp{background:var(--bg3);border:2px solid var(--acc);border-radius:var(--r);padding:22px;text-align:center;margin-bottom:14px}
.codev{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;letter-spacing:8px;color:var(--acc)}

/* Cert */
.cert{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--bd);border-radius:14px;padding:26px;position:relative;overflow:hidden}
.cert::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--acc),var(--gn),var(--bl))}
.cert-stamp{width:56px;height:56px;border-radius:50%;border:3px solid var(--gn);display:flex;align-items:center;justify-content:center;text-align:center;flex-shrink:0}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.cf{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:7px;padding:10px}
.cfl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px}
.cfv{font-size:13px;font-weight:600}

/* Tire grid */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.tcard{background:var(--bg2);border:2px solid var(--bd);border-radius:var(--r);padding:13px;cursor:pointer;transition:all .2s;position:relative}
.tcard:hover{border-color:var(--bd2);transform:translateY(-2px)}
.tcard.tsel{border-color:var(--acc);background:rgba(255,107,0,.04)}
.tcard.treco::after{content:'RECO';position:absolute;top:8px;right:-1px;background:var(--gn);color:#fff;font-size:8px;font-weight:700;padding:2px 8px;border-radius:3px 0 0 3px}
.tbrand{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px}
.tname{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;margin-bottom:7px}
.tsrow{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.tslbl{color:var(--tx3)}.tsval{font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:13px}
.lvbg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:7px}
.lvfill{height:100%;border-radius:2px;transition:width .6s}
.tcheck{position:absolute;top:8px;left:8px;width:18px;height:18px;border-radius:50%;background:var(--acc);display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}

/* ══════ HELPERS ══════ */
function getMoto(id){ return G.motos.find(function(m){return m.id===id;})||G.motos[0]; }
function colHex(c){ return {vert:'#22c55e',bleu:'#3b82f6',jaune:'#eab308',rouge:'#ef4444'}[c]||'#888'; }
function colBgHex(c){ return {vert:'rgba(34,197,94,.1)',bleu:'rgba(59,130,246,.1)',jaune:'rgba(234,179,8,.1)',rouge:'rgba(239,68,68,.1)'}[c]||''; }
function scLabel(c){ return {vert:'Excellent',bleu:'Bon',jaune:'Moyen',rouge:'Insuffisant'}[c]||''; }
function tyLabel(t){ return {vert:'🟢 Concession',bleu:'🔵 Pro validé',jaune:'🟡 Propriétaire',rouge:'🔴 Non effectué'}[t]||t; }
function tyTagCls(t){ return {vert:'tgn',bleu:'tbl',jaune:'tyw',rouge:'trd'}[t]||''; }
function fmtKm(n){ return (n||0).toLocaleString('fr-FR')+' km'; }
function fmtEur(n){ n=Math.round((n||0)*100)/100; return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }

function opStat(op, km){
  var since = km - op.kmlast;
  var pct = op.kmi>0 ? Math.min(100,(since/op.kmi)*100) : 0;
  var left = Math.max(0, op.kmi - since);
  if(pct>=100) return {s:'urgent',pct:100,left:0};
  if(pct>=80) return {s:'warning',pct:pct,left:left};
  if(pct>=40) return {s:'due',pct:pct,left:left};
  if(op.kmlast>0) return {s:'ok',pct:pct,left:left};
  return {s:'future',pct:0,left:op.kmi};
}
function opStatCol(s){ return {urgent:'#ef4444',warning:'#eab308',due:'#f97316',ok:'#22c55e',future:'#353a42'}[s]||'#888'; }
function opStatLbl(s){ return {urgent:'🔴 EN RETARD',warning:'🟡 À PLANIFIER',due:'🟠 À PRÉVOIR',ok:'🟢 À JOUR',future:'⏳ FUTURE'}[s]||''; }

/* ══════ TOAST ══════ */
function toast(msg){
  var el=document.getElementById('toastEl');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},3400);
}

/* ══════ VIEW SWITCH ══════ */
function switchView(v){
  document.getElementById('garageWrap').style.display = v==='garage'?'flex':'none';
  document.getElementById('clientWrap').style.display = v==='client'?'flex':'none';
  document.querySelectorAll('.vtab').forEach(function(t){t.classList.remove('on');});
  document.querySelector('.vtab.'+v).classList.add('on');
  if(v==='client') renderClient();
}
function onMotoChange(val){
  curMoto=parseInt(val);
  renderSection(curSec);
  if(document.getElementById('clientWrap').style.display!=='none') renderClient();
}

/* ══════ GARAGE NAV ══════ */
function goSec(sec, btn){
  curSec=sec;
  document.querySelectorAll('.snav-btn').forEach(function(b){b.classList.remove('on');});
  if(btn) btn.classList.add('on');
  renderSection(sec);
}

function renderSection(sec){
  var m=getMoto(curMoto);
  var fns={dashboard:renderDash,fiche:renderFiche,entretien:renderEntretien,pneus:renderPneus,devis:renderDevis,fraude:renderFraude,transfert:renderTransfert,params:renderParams};
  var fn=fns[sec];
  if(fn) document.getElementById('mainPanel').innerHTML=fn(m);
}

  html += '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-top:4px"><span>0</span><span>20k</span><span>40k</span><span>60k</span></div></div>';

    var lbl={tous:'Toutes',urgent:'🔴 Urgentes',warning:'🟡 À planifier',ok:'🟢 À jour'}[f];
    html += '<button class="btn '+(f===opFilter?'bpri':'bgho')+' bsm" onclick="setOpFilter(\''+f+'\')" id="opfbtn-'+f+'">'+lbl+'</button>';
  });
  html += '</div>';
  html += '<div id="opsList">'+renderOpsList(m,m.km)+'</div>';
  html += '<div class="brow"><button class="btn bpri" onclick="toast(\'📋 Bon de travail généré\')">📋 Bon de travail</button><button class="btn bgho" onclick="toast(\'📅 RDV proposé au client\')">📅 Proposer RDV</button></div>';

function updEnt(val){
  var m=getMoto(curMoto);
  var el=document.getElementById('kmValEnt');
  if(el) el.textContent=parseInt(val).toLocaleString('fr-FR');
  var list=document.getElementById('opsList');
  if(list) list.innerHTML=renderOpsList(m,parseInt(val));
}
function setOpFilter(f){
  opFilter=f;
  ['tous','urgent','warning','ok'].forEach(function(x){
    var btn=document.getElementById('opfbtn-'+x);
    if(btn){ btn.className='btn '+(x===f?'bpri':'bgho')+' bsm'; }
  });
  var m=getMoto(curMoto);
  var km=parseInt(document.getElementById('entSlider').value)||m.km;
  var list=document.getElementById('opsList');
  if(list) list.innerHTML=renderOpsList(m,km);
}
function renderOpsList(m,km){
  var html='';
  var count=0;
  m.plan.forEach(function(op){
    var st=opStat(op,km);
    if(opFilter!=='tous' && st.s!==opFilter) return;
    count++;
    var col=opStatCol(st.s);
    html += '<div class="opcard '+st.s+'" onclick="toast(\'🔧 '+op.nm+' — '+op.th+'h · '+op.prod+'\')">';
    html += '<div class="opiconw" style="background:'+col+'22">'+op.ic+'</div>';
    html += '<div style="flex:1"><div style="font-size:14px;font-weight:700;margin-bottom:3px">'+op.nm+'</div>';
    html += '<div style="font-size:11px;color:var(--pu);margin-bottom:5px">🔌 Constructeur · '+op.th+'h atelier · '+op.prod+'</div>';
    html += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px">';
    op.tags.forEach(function(tg){ html += '<span class="tag tpu">'+tg+'</span>'; });
    html += '</div><div class="oppbg"><div class="oppf" style="width:'+st.pct+'%;background:'+col+'"></div></div></div>';
    html += '<div style="text-align:right;flex-shrink:0;min-width:80px">';
    html += '<div style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:'+col+'22;color:'+col+';margin-bottom:5px">'+opStatLbl(st.s)+'</div>';
    if(st.s==='urgent') html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:18px;font-weight:700;color:'+col+'">!</div>';
    else if(st.left>0) html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:16px;font-weight:700;color:'+col+'">+'+st.left.toLocaleString('fr-FR')+'</div><div style="font-size:10px;color:var(--tx3)">km restants</div>';
    html += '</div></div>';
  });
  if(!count) html='<div style="text-align:center;padding:30px;color:var(--tx3)">Aucune opération dans ce filtre</div>';
  return html;
}

function buildTireGrid(m){
  var html='';
  G.tires.forEach(function(t){
    var isSel=t.id===selTire;
    var pair=(t.pAv+t.pAr).toFixed(2);
    html += '<div class="tcard '+(isSel?'tsel ':'')+' '+(t.reco?'treco ':'')+'" onclick="selTireF(\''+t.id+'\')">';
    html += '<div class="tcheck">✓</div>';
    html += '<div class="tbrand">'+t.br+'</div>';
    html += '<div class="tname">'+t.nm+'</div>';
    html += '<span class="tag" style="background:'+t.col+'22;color:'+t.col+';border:1px solid '+t.col+'44;margin-bottom:8px;display:inline-flex">'+t.lbl+'</span>';
    html += '<div class="tsrow"><span class="tslbl">AV (120/70-17)</span><span class="tsval" style="color:'+t.col+'">'+t.pAv+'€</span></div>';
    html += '<div class="tsrow"><span class="tslbl">AR (180/55-17)</span><span class="tsval" style="color:'+t.col+'">'+t.pAr+'€</span></div>';
    html += '<div class="tsrow" style="border-top:1px solid var(--bd);padding-top:4px;margin-top:4px"><span class="tslbl" style="font-weight:700">Paire</span><span class="tsval" style="color:var(--acc)">'+pair+'€</span></div>';
    html += '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-top:8px"><span>Longévité AR</span><span style="color:'+t.col+';font-weight:700">~'+t.kmAr.toLocaleString('fr-FR')+' km</span></div>';
    html += '<div class="lvbg"><div class="lvfill" style="width:'+t.lv+'%;background:'+t.col+'"></div></div>';
    html += '</div>';
  });
  return html;
}
function buildTireCompare(m,lastKm){
  var sel=G.tires.find(function(t){return t.id===selTire;});
  var ref=G.tires.find(function(t){return t.reco;});
  if(!sel||!ref) return '';
  var kmSince=m.km-lastKm;
  var pctAr=Math.min(100,Math.round((kmSince/sel.kmAr)*100));
  var kmLeft=Math.max(0,sel.kmAr-kmSince);
  var nextKm=lastKm+sel.kmAr;
  var isAdapted=!sel.reco;
  var diff=ref.kmAr-sel.kmAr;
  var pctDiff=Math.round((diff/ref.kmAr)*100);
  var html='<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px">'+sel.br+' '+sel.nm+' '+(!sel.reco?'<span class="tag tor" style="font-size:10px;vertical-align:middle">⚡ ADAPTÉ</span>':'<span class="tag tgn" style="font-size:10px;vertical-align:middle">✓ RECOMMANDÉ</span>')+'</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">';
  [{l:'Montage',v:lastKm.toLocaleString('fr-FR')+' km',c:'var(--tx)'},{l:'Usure AR',v:pctAr+'%',c:pctAr>80?'#ef4444':pctAr>50?'#eab308':'#22c55e'},{l:'Restant AR',v:kmLeft.toLocaleString('fr-FR')+' km',c:'var(--tx)'},{l:'Remplacement',v:nextKm.toLocaleString('fr-FR')+' km',c:'var(--acc)'}].forEach(function(box){
    html += '<div style="background:var(--bg3);border-radius:8px;padding:11px;text-align:center"><div style="font-size:10px;color:var(--tx3);margin-bottom:4px">'+box.l+'</div><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:15px;font-weight:700;color:'+box.c+'">'+box.v+'</div></div>';
  });
  html += '</div>';
  if(isAdapted){
    html += '<div class="ibn iyw"><span>⚠️</span> '+sel.nm+' : durée de vie ~'+pctDiff+'% inférieure au '+ref.nm+' recommandé. Alerte avancée à '+nextKm.toLocaleString('fr-FR')+' km.</div>';
  }
  html += '<div class="brow"><button class="btn bpri bsm" onclick="toast(\'💾 '+sel.br+' '+sel.nm+' enregistré dans le dossier\')">💾 Enregistrer</button><button class="btn bgho bsm" onclick="toast(\'📅 Alerte programmée à '+nextKm.toLocaleString('fr-FR')+' km\')">📅 Alerte</button></div>';
  return html;
}
function selTireF(id){
  selTire=id;
  var m=getMoto(curMoto);
  var g=document.getElementById('tireGridG');
  if(g) g.innerHTML=buildTireGrid(m);
  var c=document.getElementById('tireCompare');
  if(c) c.innerHTML=buildTireCompare(m,m.km-2450);
}

function updDv(id,f,v){

function addDvLine(type){
  var defs={mo:{ic:'🔧',desc:'Main d\'œuvre',ref:'MO-STD',qty:1,pu:null,spec:false},piece:{ic:'🔩',desc:'Pièce',ref:'PIE-XXX',qty:1,pu:0},pneu:{ic:'🔵',desc:'Pneu',ref:'PNE-XXX',qty:1,pu:0},fluide:{ic:'🛢️',desc:'Fluide',ref:'FLU-XXX',qty:1,pu:0},libre:{ic:'✏️',desc:'Ligne libre',ref:'—',qty:1,pu:0}};

function delDv(id){

function togDvR(id,type){
  var l=dvLines.find(function(x){return x.id===id;});
  if(!l) return;
  if(l.shr&&l.rt===type){l.shr=false;l.rt='';if(type==='litige')l.rm=0;}
  else{l.shr=true;l.rt=type;if(type==='litige'&&l.rm===0)l.rm=100;}
  var c=document.getElementById('dvlc'); if(c) c.innerHTML=buildDvLines();
  recalcDv();
}
function setRmType(t){
  rmType=t;
  recalcDv();
}
function recalcDv(){
  var moHT=0,pieHT=0,remL=0;
  dvLines.forEach(function(l){
    var pu=l.type==='mo'?(l.spec?G.garage.tauxSpec:G.garage.tauxStd):(l.pu||0);
    var brut=pu*l.qty, rem=brut*(l.rm/100);
    remL+=rem;
    if(l.type==='mo') moHT+=brut-rem; else pieHT+=brut-rem;
  });
  var sous=moHT+pieHT;
  var pct=parseFloat((document.getElementById('rgPct')||{value:0}).value)||0;
  var remG=sous*(pct/100);
  var base=sous-remG;
  var tva=base*(G.garage.tva/100);
  var ttc=base+tva;
  var calc=document.getElementById('dvCalc');
  if(!calc) return;
  var h='<div class="tcrow"><div class="tclbl">🔧 Main d\'œuvre HT</div><div class="tcval">'+fmtEur(moHT)+'</div></div>';
  h += '<div class="tcrow"><div class="tclbl">🔩 Pièces HT</div><div class="tcval">'+fmtEur(pieHT)+'</div></div>';
  if(remL>0) h += '<div class="tcrow tcg"><div class="tclbl">💚 Remises lignes</div><div class="tcval">−'+fmtEur(remL)+'</div></div>';
  h += '<div class="tcrow" style="font-weight:700"><div class="tclbl">Sous-total HT</div><div class="tcval">'+fmtEur(sous)+'</div></div>';
  if(remG>0){
    var lbl={fidelite:'★ Fidélité',geste:'🎁 Geste',litige:'⚠ Litige',aucun:''}[rmType]||'';
    var cls=rmType==='litige'?'tcr':'tcg';
    h += '<div class="tcrow '+cls+'"><div class="tclbl">'+lbl+' ('+pct+'%)</div><div class="tcval">−'+fmtEur(remG)+'</div></div>';
  }
  calc.innerHTML=h;
  var dvHT=document.getElementById('dvHT'); if(dvHT) dvHT.textContent='HT : '+fmtEur(base);
  var dvTTC=document.getElementById('dvTTC'); if(dvTTC) dvTTC.textContent=fmtEur(ttc);
  var dvTVA=document.getElementById('dvTVA'); if(dvTVA) dvTVA.textContent='TVA '+G.garage.tva+'% : '+fmtEur(tva);
  var tot=remL+remG;
  var rt=document.getElementById('dvRemTag');
  if(rt) rt.innerHTML=tot>0?'<div class="tag '+(rmType==='litige'?'trd':'tgn')+'">'+(rmType==='litige'?'⚠️':'💚')+' Geste : '+fmtEur(tot)+' offerts</div>':'';
}

function genFQr(){
  var g=(document.getElementById('fgar')||{value:''}).value;

function startFraude(){
  var g=(document.getElementById('fgar')||{value:'ok'}).value;
  var qr=(document.getElementById('fqr')||{value:''}).value;
  var sig=(document.getElementById('fsig')||{value:'ok'}).value;
  var isFake=g==='fake', hasQr=qr.length>5&&qr.indexOf('?')<0, hasSig=sig!=='none';
  var res=document.getElementById('fraudeRes');
  if(!res) return;
  var steps=['📄 Lecture document','🔍 OCR — extraction','🧠 IA — cohérence','🔲 Validation QR','🔏 Vérification signature','📊 Calcul score'];
  var stHtml='';
  steps.forEach(function(s,i){ stHtml += '<div class="fstep" id="fs'+i+'"><div class="fsi">'+s.split(' ')[0]+'</div><div class="fsinfo"><div class="fst">'+s.split(' ').slice(1).join(' ')+'</div><div class="fsd" id="fsd'+i+'">En attente…</div></div><div class="fsst" id="fsst'+i+'"></div></div>'; });
  res.innerHTML=stHtml;

  delays.forEach(function(d,i){
    cumDelay+=d;
    setTimeout(function(){
      var el=document.getElementById('fs'+i), st=document.getElementById('fsst'+i), dd=document.getElementById('fsd'+i);
      if(!el||!st||!dd) return;
      el.className='fstep running'; st.className='fsst spin'; dd.textContent='Analyse…';
      setTimeout(function(){
        var ok=i===0?true:isFake?false:i===3?hasQr:i===4?hasSig:true;
        var warn=i===3&&!hasQr&&!isFake;
        var state=warn?'warn':ok?'done':'failed';
        el.className='fstep '+state;
        st.className='fsst '+(state==='done'?'ok':state==='warn'?'warn':'fail');
        st.textContent=state==='done'?'✓':state==='warn'?'!':'✗';
        var descs=['Document lu avec succès','Données extraites','Cohérence vérifiée','QR authentifié','Signature validée','Score calculé'];
        dd.textContent=descs[i]+(isFake&&i>1?' — ÉCHEC':'')+(warn?' — QR absent':'');
        if(i===5){ setTimeout(function(){ showFraudeRes(isFake,hasQr,hasSig); },350); }
      },d-60);
    },cumDelay);
  });
}

function advTrans(step){
  transStep=step;
  var m=getMoto(curMoto);
  for(var i=0;i<5;i++){
    var d=document.getElementById('tsd'+i), l=document.getElementById('tsl'+i), it=document.getElementById('tsi'+i);
    if(!d||!l||!it) continue;
    var done=i<step-1, act=i===step-1;
    d.className='tsdot '+(done?'ts-done':act?'ts-active':'');
    d.textContent=done?'✓':(i+1);
    l.className='tslbl '+(done?'ts-done':act?'ts-active':'');
    it.className='tsitem '+(done?'ts-done':'');
  }
  var pan=document.getElementById('transPan'); if(pan) pan.innerHTML=buildTransPanel(m);
}

    html += '<div style="background:#1a1714;border-radius:14px;padding:19px;text-align:center;margin-top:13px"><div style="font-family:\'DM Serif Display\',serif;font-size:18px;color:#fff;margin-bottom:4px">QR Code MotoKey</div><div style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:13px">Partagez lors d\'une revente</div><div style="width:85px;height:85px;background:#fff;border-radius:10px;margin:0 auto 13px;display:flex;align-items:center;justify-content:center;font-size:48px">🔲</div><div style="display:flex;gap:8px;justify-content:center"><button onclick="toast(\'📤 QR Code partagé\')" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:8px 15px;color:#fff;font-size:12px;font-weight:600;cursor:pointer">📤 Partager</button><button onclick="toast(\'⬇️ Téléchargé\')" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:8px 15px;color:#fff;font-size:12px;font-weight:600;cursor:pointer">⬇️ Télécharger</button></div></div>';
    html += '</div>';
    return html;
  }
  return '';
}

  };
  var b=document.getElementById('modalBox');
  if(b) b.innerHTML=bodies[id]||'<div class="mbody">Erreur</div>';
  document.getElementById('movl').classList.add('open');
}
function closeModal(){ document.getElementById('movl').classList.remove('open'); }
function saveInter(){
  var motoId=parseInt((document.getElementById('im')||{value:curMoto}).value)||curMoto;
  var desc=(document.getElementById('idesc')||{value:'Intervention'}).value||'Intervention';
  var km=parseInt((document.getElementById('ikm')||{value:0}).value)||0;
  var ty=window._itype||'bleu';
  var m=G.motos.find(function(x){return x.id===motoId;})||getMoto(curMoto);
  var today=new Date();
  var ds=String(today.getDate()).padStart(2,'0')+'/'+String(today.getMonth()+1).padStart(2,'0')+'/'+today.getFullYear();
  m.hist.unshift({t:desc,d:ds,km:km||m.km,ty:ty,tech:'J.-M. Duval',desc:desc,vf:Math.floor(Math.random()*14+82),isN:true});
  if(km>m.km) m.km=km;
  m.sc=Math.min(100,m.sc+({vert:12,bleu:8,jaune:5,rouge:-5}[ty]||0));
  m.col=m.sc>=80?'vert':m.sc>=60?'bleu':m.sc>=40?'jaune':'rouge';
  closeModal();
  document.getElementById('cndot').style.display='block';
  toast('⚡ Intervention enregistrée · Sync '+m.own+' ✓');
  renderSection(curSec);
}

var API_URL = 'https://motokey-api-10-production.up.railway.app';
var API_TOKEN = '';

async function apiLogin(email, password, role) {
  try {
    const r = await fetch(API_URL + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, role })
    });
    const data = await r.json();
    if (data.success) {
      API_TOKEN = data.data.token;
      toast('✅ Connecté à l\'API Railway · ' + email);
      return data.data;
    }
  } catch(e) { console.warn('API offline, mode local'); }
}

async function apiCall(method, path, body) {
  try {
    const opts = {
      method,
      headers: {
        'Content-Type':  'application/json',
        'Authorization': 'Bearer ' + API_TOKEN
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API_URL + path, opts);
    return await r.json();
  } catch(e) {
    console.warn('API call failed:', path);
    return null;
  }
}

// Indicateur de statut API dans la barre

  try {
    const r = await fetch(API_URL + '/');

        bar.appendChild(pill.firstChild);
      }
      // Auto-login garage de démo
      await apiLogin('garage@motokey.fr', 'motokey2026', 'garage');
    }
  } catch(e) {}
})();
