<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>MotoKey — Application Complète</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   VARIABLES & RESET
════════════════════════════════════════ */
:root {
  --bg:#0d0f12;--bg2:#141618;--bg3:#1c1f23;--bg4:#22262c;
  --border:#2a2d32;--border2:#353a42;
  --text:#e8eaed;--text2:#8b9199;--text3:#555c66;
  --accent:#ff6b00;--accent2:#ff8c33;
  --green:#22c55e;--green-bg:rgba(34,197,94,.1);--green-b:rgba(34,197,94,.28);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.1);--blue-b:rgba(59,130,246,.28);
  --yellow:#eab308;--yellow-bg:rgba(234,179,8,.1);--yellow-b:rgba(234,179,8,.28);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);--red-b:rgba(239,68,68,.28);
  --orange:#f97316;--orange-bg:rgba(249,115,22,.1);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,.1);--purple-b:rgba(168,85,247,.28);
  --r:10px;--sh:0 4px 24px rgba(0,0,0,.3);
  /* client theme */
  --cbg:#f4f1ec;--cbg2:#faf8f4;--ccard:#fff;--cborder:#e8e3d8;
  --ct:#1a1714;--ct2:#6b6459;--ct3:#a89e92;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
input,select,textarea{font-family:'Barlow',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ════════════════════════════════════════
   MAIN SWITCHER BAR
════════════════════════════════════════ */
#mainBar{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:1000;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:14px;
}
.app-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:1px;color:var(--text)}
.app-logo span{color:var(--accent)}
.bar-sep{width:1px;height:20px;background:var(--border)}
.view-tabs{display:flex;gap:5px}
.view-tab{padding:6px 16px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s;letter-spacing:.5px;text-transform:uppercase}
.view-tab.garage{background:rgba(255,107,0,.15);color:var(--accent)}
.view-tab.garage.active{background:var(--accent);color:#fff}
.view-tab.client{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.view-tab.client.active{background:#fff;color:#1a1714}
.bar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-pill{display:flex;align-items:center;gap:6px;background:var(--green-bg);border:1px solid var(--green-b);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--green)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.moto-sel{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 10px;color:var(--text);font-size:12px;outline:none;cursor:pointer}

/* ════════════════════════════════════════
   GARAGE LAYOUT
════════════════════════════════════════ */
#garageView{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
#clientView{position:fixed;top:52px;left:0;right:0;bottom:0;display:none;justify-content:center;background:var(--cbg);overflow-y:auto}

/* SIDEBAR */
.g-sidebar{
  width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
}
.g-nav{padding:12px 10px;flex:1}
.g-nav-sec{font-size:9px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;padding:12px 8px 6px}
.g-nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;
  cursor:pointer;font-size:13px;color:var(--text2);font-weight:500;
  transition:all .15s;border:none;background:none;width:100%;text-align:left;
}
.g-nav-item:hover{background:var(--bg3);color:var(--text)}
.g-nav-item.active{background:rgba(255,107,0,.15);color:var(--accent)}
.g-nav-item svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2}
.g-nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700}
.g-nav-badge.red{background:var(--red)}
.g-sidebar-foot{padding:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.g-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#c43d00);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.g-user-name{font-size:12px;font-weight:600}
.g-user-role{font-size:10px;color:var(--text3)}

/* MAIN CONTENT */
.g-main{flex:1;overflow-y:auto;overflow-x:hidden}

/* ════════════════════════════════════════
   COMMON COMPONENTS
════════════════════════════════════════ */
.page-wrap{padding:24px;min-height:100%}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:.5px}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.card.clickable{cursor:pointer;transition:all .2s}
.card.clickable:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
.card.clickable.sel{border-color:var(--accent);background:rgba(255,107,0,.04)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#16a34a}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}

/* Inputs */
.f-group{margin-bottom:14px}
.f-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;display:block}
.f-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
.f-input:focus{border-color:var(--accent)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-select{appearance:none;cursor:pointer}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.tag-yellow{background:var(--yellow-bg);color:var(--yellow)}
.tag-red{background:var(--red-bg);color:var(--red)}
.tag-orange{background:var(--orange-bg);color:var(--orange)}
.tag-purple{background:var(--purple-bg);color:var(--purple)}

/* Stat cards */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.g::before{background:var(--green)}.stat-card.b::before{background:var(--blue)}
.stat-card.y::before{background:var(--yellow)}.stat-card.r::before{background:var(--red)}
.stat-card.o::before{background:var(--orange)}.stat-card.p::before{background:var(--purple)}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;line-height:1}
.stat-card.g .stat-val{color:var(--green)}.stat-card.b .stat-val{color:var(--blue)}
.stat-card.y .stat-val{color:var(--yellow)}.stat-card.r .stat-val{color:var(--red)}
.stat-card.o .stat-val{color:var(--orange)}.stat-card.p .stat-val{color:var(--purple)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px}

/* Score bar */
.score-wrap{display:flex;flex-direction:column;gap:4px;min-width:130px}
.score-bar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:2px;transition:width .6s}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:700px;max-height:88vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.modal-body{padding:22px}
.modal-close{margin-left:auto;width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:16px}
.modal-close:hover{background:var(--red-bg);color:var(--red)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;z-index:3000;display:flex;align-items:center;gap:8px;transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);max-width:380px}
.toast.show{transform:translateY(0);opacity:1}

/* Info banner */
.info-ban{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:8px;border:1px solid;margin-bottom:12px;font-size:13px;line-height:1.5}
.info-ban.blue{background:var(--blue-bg);border-color:var(--blue-b);color:#93b8f5}
.info-ban.green{background:var(--green-bg);border-color:var(--green-b);color:#86efac}
.info-ban.yellow{background:var(--yellow-bg);border-color:var(--yellow-b);color:#fde68a}
.info-ban.red{background:var(--red-bg);border-color:var(--red-b);color:#fca5a5}
.info-ban.orange{background:var(--orange-bg);border-color:rgba(249,115,22,.3);color:#fdba74}

/* ════════════════════════════════════════
   SECTION: DASHBOARD
════════════════════════════════════════ */
.moto-grid{display:grid;gap:10px}
.moto-row{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  display:grid;grid-template-columns:42px 1fr 110px 90px 150px 12px;
  align-items:center;gap:14px;padding:13px 16px;
  cursor:pointer;transition:all .2s;
}
.moto-row:hover{border-color:var(--accent);background:var(--bg3)}
.moto-row.flash{animation:flashRow .6s ease}
@keyframes flashRow{0%{border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.25)}100%{border-color:var(--border);box-shadow:none}}
.moto-icon{width:40px;height:40px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px}
.moto-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700}
.moto-meta{font-size:11px;color:var(--text3);margin-top:2px}
.moto-plate{background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px}
.moto-km{text-align:right}
.moto-km-val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700}
.moto-km-lbl{font-size:10px;color:var(--text3)}
.color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ════════════════════════════════════════
   SECTION: FICHE MOTO (detail)
════════════════════════════════════════ */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.d-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:13px}
.d-box-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
.d-box-val{font-size:14px;font-weight:600}
.score-big{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px;grid-column:span 2;display:flex;align-items:center;gap:16px}
.score-circle{width:65px;height:65px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;border:3px solid;flex-shrink:0}
.sc-num{font-size:22px;font-weight:900;line-height:1}
.sc-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase}
.bdwn-item{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bdwn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bdwn-lbl{font-size:12px;color:var(--text2);flex:1}
.bdwn-bar{width:70px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;flex-shrink:0}
.bdwn-fill{height:100%;border-radius:2px}
.bdwn-pts{font-size:11px;font-weight:700;width:32px;text-align:right}

/* Timeline historique */
.hist-timeline{position:relative;padding-left:20px}
.hist-timeline::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--border)}
.hist-item{position:relative;margin-bottom:12px}
.hist-dot{position:absolute;left:-18px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg2)}
.hist-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 13px}
.hist-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.hist-card-title{font-size:13px;font-weight:600}
.hist-card-date{font-size:11px;color:var(--text3)}
.hist-card-desc{font-size:12px;color:var(--text2)}
.hist-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px}

/* ════════════════════════════════════════
   SECTION: ENTRETIEN
════════════════════════════════════════ */
.km-slider{width:100%;appearance:none;height:5px;border-radius:3px;background:var(--border2);outline:none;cursor:pointer}
.km-slider::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 2px 8px rgba(255,107,0,.3)}
.op-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px;display:flex;gap:12px;align-items:flex-start;margin-bottom:9px;cursor:pointer;transition:all .2s;position:relative}
.op-card:hover{border-color:var(--border2)}
.op-card.urgent{border-left:3px solid var(--red)}
.op-card.warning{border-left:3px solid var(--yellow)}
.op-card.ok{border-left:3px solid var(--green)}
.op-card.future{border-left:3px solid var(--border2);opacity:.65}
.op-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.op-prog-bg{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.op-prog-fill{height:100%;border-radius:2px;transition:width .8s}

/* ════════════════════════════════════════
   SECTION: DEVIS
════════════════════════════════════════ */
.dv-head{display:grid;grid-template-columns:26px 1fr 85px 65px 70px 75px 85px 30px;gap:8px;padding:6px 12px;background:var(--bg3);border-radius:7px 7px 0 0;margin-bottom:2px}
.dv-hc{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.dv-hc.r{text-align:right}
.dv-row{display:grid;grid-template-columns:26px 1fr 85px 65px 70px 75px 85px 30px;gap:8px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;margin-bottom:5px;align-items:center;transition:border-color .15s}
.dv-row:hover{border-color:var(--border2)}
.dv-row.green-row{border-color:var(--green-b);background:var(--green-bg)}
.dv-row.red-row{border-color:var(--red-b);background:var(--red-bg)}
.ci{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:4px 7px;color:var(--text);font-size:12px;width:100%;outline:none;text-align:right;transition:border-color .15s}
.ci:focus{border-color:var(--accent)}
.ci.green-ci{border-color:var(--green-b);color:var(--green);font-weight:700}
.ci.red-ci{border-color:var(--red-b);color:var(--red);font-weight:700}
.row-icon-btn{width:14px;height:14px;border-radius:3px;border:none;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.row-icon-btn.g{background:var(--green-bg);color:var(--green)}
.row-icon-btn.g:hover{background:var(--green);color:#fff}
.row-icon-btn.r{background:var(--red-bg);color:var(--red)}
.row-icon-btn.r:hover{background:var(--red);color:#fff}
.row-icon-btn.x{background:var(--bg3);color:var(--text3)}
.row-icon-btn.x:hover{background:var(--red);color:#fff}
.reason-row{display:flex;align-items:center;gap:8px;padding:4px 12px 8px;margin-top:-3px}
.reason-in{flex:1;border:1px solid;border-radius:6px;padding:5px 10px;font-size:11px;outline:none}

/* Totals */
.total-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-top:16px}
.tc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.tc-row:last-child{border:none;padding-top:14px}
.tc-label{color:var(--text2)}
.tc-val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700}
.tc-row.green-tc{background:var(--green-bg);border-radius:6px;padding:7px 10px;border:none;margin:4px 0}
.tc-row.green-tc .tc-label{color:var(--green)}
.tc-row.green-tc .tc-val{color:var(--green)}
.tc-row.red-tc{background:var(--red-bg);border-radius:6px;padding:7px 10px;border:none;margin:4px 0}
.tc-row.red-tc .tc-label{color:var(--red)}
.tc-row.red-tc .tc-val{color:var(--red)}
.total-ttc-block{background:var(--bg);border-radius:10px;padding:20px;text-align:center;margin-top:14px}
.ttc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.ttc-ht{font-size:12px;color:var(--text3);margin-bottom:3px}
.ttc-val{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;color:var(--text)}
.ttc-tva{font-size:11px;color:var(--text3);margin-top:4px}

/* ════════════════════════════════════════
   SECTION: ANTI-FRAUDE
════════════════════════════════════════ */
.fraud-steps{display:grid;gap:10px}
.f-step{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px;transition:all .3s}
.f-step.running{border-color:var(--yellow-b);background:var(--yellow-bg)}
.f-step.done{border-color:var(--green-b);background:var(--green-bg)}
.f-step.failed{border-color:var(--red-b);background:var(--red-bg)}
.f-step.warn{border-color:var(--yellow-b);background:var(--yellow-bg)}
.f-step-icon{font-size:22px;width:30px;text-align:center}
.f-step-info{flex:1}
.f-step-title{font-size:13px;font-weight:600}
.f-step-desc{font-size:11px;color:var(--text2);margin-top:2px}
.f-step-status{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all .3s}
.f-step-status.spin{animation:spin .8s linear infinite;border-top-color:var(--yellow);border-color:var(--border2)}
@keyframes spin{to{transform:rotate(360deg)}}
.f-step-status.ok{background:var(--green);border-color:var(--green);color:#fff}
.f-step-status.fail{background:var(--red);border-color:var(--red);color:#fff}
.f-step-status.warn{background:var(--yellow);border-color:var(--yellow);color:#000}

/* Trust circle */
.trust-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:22px;display:flex;align-items:center;gap:22px;margin-bottom:16px}
.trust-circle{position:relative;width:100px;height:100px;flex-shrink:0}
.trust-circle svg{transform:rotate(-90deg)}
.trust-num-wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.trust-pct{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1}
.trust-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.trust-verdict{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;margin-bottom:6px}
.trust-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}

/* ════════════════════════════════════════
   SECTION: TRANSFERT
════════════════════════════════════════ */
.transfer-steps{display:grid;grid-template-columns:repeat(5,1fr);gap:0;margin-bottom:22px}
.ts-item{display:flex;flex-direction:column;align-items:center;position:relative}
.ts-item::before{content:'';position:absolute;top:15px;left:50%;right:-50%;height:2px;background:var(--border);z-index:0}
.ts-item:last-child::before{display:none}
.ts-item.done::before{background:var(--green)}
.ts-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;z-index:1;transition:all .3s;border:2px solid var(--border);background:var(--bg3);color:var(--text3)}
.ts-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.ts-dot.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 4px rgba(255,107,0,.2)}
.ts-label{font-size:10px;color:var(--text3);margin-top:5px;text-align:center;max-width:80px;line-height:1.3}
.ts-label.active{color:var(--accent)}
.ts-label.done{color:var(--green)}

/* Code display */
.code-display{background:var(--bg3);border:2px solid var(--accent);border-radius:var(--r);padding:24px;text-align:center;margin-bottom:16px}
.code-val{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;letter-spacing:8px;color:var(--accent)}

/* Certificate */
.cert{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:14px;padding:28px;position:relative;overflow:hidden}
.cert::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--green),var(--blue))}
.cert-stamp{width:60px;height:60px;border-radius:50%;border:3px solid var(--green);display:flex;align-items:center;justify-content:center;text-align:center;flex-shrink:0}
.cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.cert-field{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:11px}
.cert-field-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px}
.cert-field-val{font-size:13px;font-weight:600}

/* ════════════════════════════════════════
   SECTION: PNEUS
════════════════════════════════════════ */
.tire-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.tire-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s;position:relative}
.tire-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.tire-card.sel{border-color:var(--accent);background:rgba(255,107,0,.04)}
.tire-card.reco::after{content:'✓ RECO';position:absolute;top:9px;right:-1px;background:var(--green);color:#fff;font-size:8px;font-weight:700;padding:2px 8px;border-radius:3px 0 0 3px}
.tire-brand{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px}
.tire-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;margin-bottom:8px}
.tire-spec-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.tire-spec-label{color:var(--text3)}
.tire-spec-val{font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:13px}
.lv-bar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.lv-bar-fill{height:100%;border-radius:2px;transition:width .6s}
.tire-check{position:absolute;top:9px;left:9px;width:18px;height:18px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}
.tire-card.sel .tire-check{display:flex}

/* ════════════════════════════════════════
   SECTION: PARAMÈTRES
════════════════════════════════════════ */
.params-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.param-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px}

.param-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}

.param-label{font-size:13px;color:var(--text2)}
.param-input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;width:80px;text-align:right;outline:none}
.param-input:focus{border-color:var(--accent)}
.param-unit{font-size:11px;color:var(--text3);margin-left:4px}
.preset-row{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.preset-btn{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:none;transition:all .15s}

const colVar = c => ({vert:'var(--green)',bleu:'var(--blue)',jaune:'var(--yellow)',rouge:'var(--red)'}[c]||'var(--text)');
const colBg  = c => ({vert:'var(--green-bg)',bleu:'var(--blue-bg)',jaune:'var(--yellow-bg)',rouge:'var(--red-bg)'}[c]||'');
const scoreLabel = c => ({vert:'Excellent',bleu:'Bon',jaune:'Moyen',rouge:'Insuffisant'}[c]||'');
const typeLabel  = t => ({vert:'🟢 Concession',bleu:'🔵 Pro validé',jaune:'🟡 Propriétaire',rouge:'🔴 Non effectué'}[t]||t);
const typeTagCls = t => ({vert:'tag-green',bleu:'tag-blue',jaune:'tag-yellow',rouge:'tag-red'}[t]||'');
const fmtKm = n => (n||0).toLocaleString('fr-FR')+' km';
const fmtEur = n => (Math.round((n||0)*100)/100).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';

function getOpStatus(op, km, moto) {
  const since = km - op.kmDerniere;
  const pct = Math.min(100, op.kmInterval>0 ? (since/op.kmInterval)*100 : 0);
  const kmLeft = Math.max(0, op.kmInterval - since);
  if(pct>=100) return {s:'urgent',pct:100,kmLeft:0};
  if(pct>=80) return {s:'warning',pct,kmLeft};
  if(pct>=40) return {s:'due',pct,kmLeft};
  if(op.kmDerniere>0) return {s:'ok',pct,kmLeft};
  return {s:'future',pct:0,kmLeft:op.kmInterval};
}

function opStatusColor(s){
  return {urgent:'var(--red)',warning:'var(--yellow)',due:'var(--orange)',ok:'var(--green)',future:'var(--border2)'}[s]||'var(--text)';
}
function opStatusLabel(s){
  return {urgent:'🔴 EN RETARD',warning:'🟡 À PLANIFIER',due:'🟠 À PRÉVOIR',ok:'🟢 À JOUR',future:'⏳ FUTURE'}[s]||'';
}

function goSection(sec){
  currentGSection = sec;

  document.querySelectorAll('.g-nav-item').forEach(b=>{
    if(b.textContent.trim().toLowerCase().includes(sec.substring(0,4).toLowerCase())) b.classList.add('active');
  });
  // manual match
  const labels = {dashboard:'tableau',fiche:'fiche',entretien:'entretien',pneus:'pneus',devis:'devis',fraude:'anti',transfert:'transfert',params:'param'};
  document.querySelectorAll('.g-nav-item').forEach(b=>{
    if(b.textContent.toLowerCase().includes(labels[sec]||sec)) b.classList.add('active');
  });
  renderSection(sec);
}

  const m = getMoto(currentMotoId);
  const html = {
    dashboard: renderDashboard,
    fiche:     renderFiche,

    pneus:     renderPneus,

    transfert: renderTransfert,

function updDL(id,f,v){const l=devisLines.find(x=>x.id===id);if(l){l[f]=v;renderDevisLines();recalcDevis();}}
function addDevisLine(type){
  const defs={mo:{icon:'🔧',desc:'Main d\'œuvre',ref:'MO-STD',qty:1,pu:null,useTauxSpec:false},piece:{icon:'🔩',desc:'Pièce',ref:'PIE-XXX',qty:1,pu:0},pneu:{icon:'🔵',desc:'Pneu',ref:'PNE-XXX',qty:1,pu:0},fluide:{icon:'🛢️',desc:'Fluide',ref:'FLU-XXX',qty:1,pu:0},libre:{icon:'✏️',desc:'Ligne libre',ref:'—',qty:1,pu:0}};
  devisLines.push({id:++devisLineId,type,...defs[type]||defs.libre,remisePct:0,reasonType:'',note:'',showR:false});
  renderDevisLines();recalcDevis();
}
function delDL(id){devisLines=devisLines.filter(x=>x.id!==id);renderDevisLines();recalcDevis();}
function toggleDLReason(id,type){const l=devisLines.find(x=>x.id===id);if(!l)return;if(l.showR&&l.reasonType===type){l.showR=false;l.reasonType='';if(type==='litige')l.remisePct=0;}else{l.showR=true;l.reasonType=type;if(type==='litige'&&l.remisePct===0)l.remisePct=100;}renderDevisLines();recalcDevis();}
function setGType(t){globalRemiseType=t;recalcDevis();}
function recalcDevis(){
  let moHT=0,pieHT=0,remLines=0;
  devisLines.forEach(l=>{
    const pu=l.type==='mo'?(l.useTauxSpec?DB.garage.tauxSpec:DB.garage.tauxStd):(l.pu||0);
    const brut=pu*l.qty;const rem=brut*(l.remisePct/100);
    remLines+=rem;
    if(l.type==='mo')moHT+=brut-rem;else pieHT+=brut-rem;
  });
  const sous=moHT+pieHT;
  const rgPct=parseFloat(document.getElementById('rgPct')?.value||0)||0;
  const remG=sous*(rgPct/100);
  const base=sous-remG;
  const tva=base*(DB.garage.tva/100);
  const ttc=base+tva;
  const calcEl=document.getElementById('devisCalcRows');
  if(!calcEl)return;
  let html=`<div class="tc-row"><div class="tc-label">🔧 Main d'œuvre HT</div><div class="tc-val">${fmtEur(moHT)}</div></div>
    <div class="tc-row"><div class="tc-label">🔩 Pièces HT</div><div class="tc-val">${fmtEur(pieHT)}</div></div>`;
  if(remLines>0)html+=`<div class="tc-row green-tc"><div class="tc-label">💚 Remises lignes</div><div class="tc-val">−${fmtEur(remLines)}</div></div>`;
  html+=`<div class="tc-row" style="font-weight:700"><div class="tc-label">Sous-total HT</div><div class="tc-val">${fmtEur(sous)}</div></div>`;
  if(remG>0){const cls=globalRemiseType==='litige'?'red-tc':'green-tc';const lbl={fidelite:'★ Fidélité',geste:'🎁 Geste',litige:'⚠ Litige',aucun:''}[globalRemiseType];html+=`<div class="tc-row ${cls}"><div class="tc-label">${lbl} (${rgPct}%)</div><div class="tc-val">−${fmtEur(remG)}</div></div>`;}
  calcEl.innerHTML=html;
  document.getElementById('dvHT').textContent='HT : '+fmtEur(base);
  document.getElementById('dvTTC').textContent=fmtEur(ttc);
  document.getElementById('dvTVA').textContent=`TVA ${DB.garage.tva}% : ${fmtEur(tva)}`;
  const tot=remLines+remG;
  document.getElementById('dvRemTag').innerHTML=tot>0?`<div class="${globalRemiseType==='litige'?'tag tag-red':'tag tag-green'}">${globalRemiseType==='litige'?'⚠️':'💚'} Geste : ${fmtEur(tot)} offerts</div>`:'';
}
function validerDevis(){
  const m=getMoto(currentMotoId);
  m.score=Math.min(100,m.score+8);
  const today=new Date();
  const dateStr=`${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;

function genQr(){
  const g=document.getElementById('fraudGarage').value;
  const codes={ok:'MK-2026-SHOP-7X3A',ok2:'MK-2026-TOPM-9B2F',ok3:'MK-2026-YAMA-4C8D',unknown:'',fake:'MK-2025-????-XXXX'};
  document.getElementById('fraudQr').value=codes[g]||'';
  showToast('📷 QR scanné : '+(codes[g]||'Code absent'));
}
function startFraude(){
  const g=document.getElementById('fraudGarage').value;
  const q=document.getElementById('fraudQr').value;
  const sig=document.getElementById('fraudSig').value;
  const isFake=g==='fake';
  const hasQr=q.length>5&&!q.includes('?');
  const hasSig=sig!=='none';
  document.getElementById('fraudeResults').innerHTML=`<div class="fraud-steps" id="fSteps">${['📄 Lecture document','🔍 OCR — extraction','🧠 IA — cohérence','🔲 Validation QR','🔏 Vérification signature','📊 Calcul score'].map((s,i)=>`<div class="f-step" id="fst${i}"><div class="f-step-icon">${s.split(' ')[0]}</div><div class="f-step-info"><div class="f-step-title">${s.split(' ').slice(1).join(' ')}</div><div class="f-step-desc" id="fstd${i}">En attente…</div></div><div class="f-step-status" id="fsts${i}"></div></div>`).join('')}</div>`;
  const delays=[400,600,700,500,500,400];
  let t=0;
  delays.forEach((d,i)=>{
    t+=d;
    setTimeout(()=>{
      const el=document.getElementById('fst'+i);
      const st=document.getElementById('fsts'+i);
      const dd=document.getElementById('fstd'+i);
      el.className='f-step running';st.className='f-step-status spin';dd.textContent='Analyse…';
      setTimeout(()=>{
        const ok=isFake?i<1:true;
        const warn=!hasQr&&i===3;
        const state=ok&&!warn?'done':warn?'warn':'failed';
        el.className=`f-step ${state}`;
        st.className=`f-step-status ${state==='done'?'ok':state==='warn'?'warn':'fail'}`;
        st.textContent=state==='done'?'✓':state==='warn'?'!':'✗';
        dd.textContent=['Document lu avec succès','Données extraites','Cohérence vérifiée','QR authentifié','Signature validée','Score calculé'][i]+(isFake&&i>1?' — ÉCHEC':'')+(warn?' — QR absent':'');
        if(i===5){
          const score=isFake?Math.floor(Math.random()*18+5):hasQr&&hasSig?94:hasSig?72:55;
          setTimeout(()=>showFraudeResult(score,isFake,hasQr,hasSig),400);
        }
      },d-50);
    },t);
  });
}
function showFraudeResult(score,isFake,hasQr,hasSig){
  const col=score>=85?'var(--green)':score>=60?'var(--yellow)':'var(--red)';
  const verb=score>=85?'✅ Facture authentifiée':score>=60?'⚠️ Vérification partielle':'🚨 Fraude suspectée';
  const sub=score>=85?'Tous les contrôles passés. Facture fiable.':score>=60?'Éléments partiels. Vérification manuelle conseillée.':'Fraude détectée. Ne pas intégrer au dossier.';
  document.getElementById('fraudeResults').innerHTML=`
    <div class="trust-hero">
      <div class="trust-circle">
        <svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="var(--bg3)" stroke-width="7"/><circle cx="50" cy="50" r="42" fill="none" stroke="${col}" stroke-width="7" stroke-linecap="round" stroke-dasharray="${2*Math.PI*42}" stroke-dashoffset="${2*Math.PI*42*(1-score/100)}" style="transition:stroke-dashoffset 1.2s"/></svg>
        <div class="trust-num-wrap"><div class="trust-pct" style="color:${col}">${score}%</div><div class="trust-lbl">confiance</div></div>
      </div>
      <div style="flex:1">
        <div class="trust-verdict" style="color:${col}">${verb}</div>
        <div class="trust-sub">${sub}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${hasQr?'<span class="tag tag-green">QR Valide</span>':'<span class="tag tag-yellow">QR absent</span>'}
          ${hasSig&&!isFake?'<span class="tag tag-green">Signature OK</span>':'<span class="tag tag-red">Signature KO</span>'}
          ${!isFake?'<span class="tag tag-blue">IA: cohérent</span>':'<span class="tag tag-red">IA: suspect</span>'}
        </div>
      </div>
    </div>
    <div class="btn-row">
      ${score>=60?`<button class="btn btn-green btn-sm" onclick="showToast('✅ Facture intégrée au dossier · Score : ${score}%');document.getElementById('fraudeBadge').textContent='0'">✅ Valider</button>`:''}
      <button class="btn btn-danger btn-sm" onclick="showToast('🗑️ Facture rejetée')">✗ Rejeter</button>
      ${score<60?`<button class="btn btn-ghost btn-sm" onclick="showToast('🚔 Signalement envoyé')">📢 Signaler</button>`:''}
    </div>`;
}

function advTransfert(step){

    const done=i<step-1,active=i===step-1;

    l.className=`ts-label ${done?'done':active?'active':''}`;
    if(done){d.textContent='✓';}else{d.textContent=i+1;}
    if(i<step-1) item.classList.add('done'); else item.classList.remove('done');
  }
  renderTransfertPanel();
}

function setPresets(std,spec){DB.garage.tauxStd=std;DB.garage.tauxSpec=spec;showToast(`💾 Taux mis à jour : ${std}€/h std · ${spec}€/h spécialiste`);}

/* ════════════════════════════════════════
   CLIENT VIEW
════════════════════════════════════════ */
function renderClientView(){
  const m=getMoto(currentMotoId);
  document.getElementById('cPages').innerHTML=`
    <div class="c-page active" id="cpage-home"></div>
    <div class="c-page" id="cpage-history"></div>
    <div class="c-page" id="cpage-entretien"></div>
    <div class="c-page" id="cpage-docs"></div>`;
  renderCPage(m,'home');
  renderCPage(m,'history');
  renderCPage(m,'entretien');
  renderCPage(m,'docs');
}
function renderCPage(m,page){
  const el=document.getElementById('cpage-'+page);
  if(!el)return;
  const col=colVar(m.couleur);
  const colDot=({vert:'#22c55e',bleu:'#3b82f6',jaune:'#eab308',rouge:'#ef4444'})[m.couleur]||'#3b82f6';
  if(page==='home'){
    const urgents=m.plan.filter(op=>getOpStatus(op,m.km).s==='urgent'||getOpStatus(op,m.km).s==='warning').slice(0,2);
    el.innerHTML=`
      <div class="c-hero">
        <div class="c-greeting">Bonjour,</div>
        <div class="c-name">${m.proprio}</div>
        <div class="c-moto-row">
          <div><div class="c-moto-name">${m.marque} ${m.modele}</div><div class="c-moto-meta">${m.annee} · ${m.plaque} · ${fmtKm(m.km)}</div></div>
          <div class="c-score-circ"><div class="c-score-num">${m.score}</div><div class="c-score-lbl">/100</div></div>
        </div>
        <div class="c-badge"><div class="c-badge-dot" style="background:${colDot}"></div>${scoreLabel(m.couleur)} — ${typeLabel(m.couleur).replace(/🟢|🔵|🟡|🔴/g,'').trim()}</div>
      </div>
      <div class="c-qs">
        <div class="c-qs-card"><div class="c-qs-label">Interventions</div><div class="c-qs-val">${m.hist.length}</div><div class="c-qs-sub">enregistrées</div></div>
        <div class="c-qs-card"><div class="c-qs-label">Dernière révision</div><div class="c-qs-val">${m.hist[0]?.d?.slice(0,5)||'—'}</div><div class="c-qs-sub">${m.hist[0]?.d?.slice(6)||''}</div></div>
        <div class="c-qs-card"><div class="c-qs-label">Factures</div><div class="c-qs-val">${m.hist.length}</div><div class="c-qs-sub">numérisées</div></div>
        <div class="c-qs-card"><div class="c-qs-label">Prochain entretien</div><div class="c-qs-val">${(Math.ceil(m.km/6000)*6000+6000-m.km).toLocaleString('fr-FR')}</div><div class="c-qs-sub">km restants</div></div>
      </div>
      <div class="c-section">
        <div class="c-sec-title">Alertes d'entretien</div>
        ${urgents.length===0?`<div class="c-alert ok"><div class="c-alert-icon">✅</div><div><div class="c-alert-title">Tout est à jour</div><div class="c-alert-desc">Votre ${m.marque} est en parfait état selon le plan constructeur.</div></div></div>`:urgents.map(op=>{const {s,kmLeft}=getOpStatus(op,m.km);return `<div class="c-alert ${s==='urgent'?'urgent':'warn'}"><div class="c-alert-icon">${s==='urgent'?'🚨':'⚠️'}</div><div><div class="c-alert-title">${op.icon} ${op.nom}</div><div class="c-alert-desc">${s==='urgent'?'Dépassé — intervention urgente':'À planifier — '+kmLeft.toLocaleString('fr-FR')+' km restants'} · Produit: ${op.produit}</div><div class="c-alert-action" onclick="showToast('📅 Demande de RDV envoyée au garage')">📅 Prendre RDV</div></div></div>`;}).join('')}
      </div>
      <div class="c-section">
        <div class="c-sec-title">Dernières interventions</div>
        ${m.hist.slice(0,2).map(h=>`<div class="c-hist-card">${h.isNew?'<div class="c-new-tag">NOUVEAU</div>':''}<div class="c-hist-bar" style="background:${colVar(h.type)}"></div><div style="flex:1"><div class="c-hist-title">${h.t}</div><div class="c-hist-meta">${h.tech} · ${h.d}</div><span class="tag ${typeTagCls(h.type)}">${typeLabel(h.type)}</span><div class="c-hist-km">📍 ${fmtKm(h.km)} <span style="color:var(--purple);font-weight:600;margin-left:8px">🛡️ ${h.verif}% fiable</span></div></div></div>`).join('')}
      </div>`;
  }
  if(page==='history'){
    el.innerHTML=`<div style="padding:14px 14px 0"><div style="font-family:'DM Serif Display',serif;font-size:22px;color:var(--ct);margin-bottom:14px">Historique complet</div></div><div class="c-section">
      ${m.hist.map(h=>`<div class="c-hist-card">${h.isNew?'<div class="c-new-tag">NOUVEAU</div>':''}<div class="c-hist-bar" style="background:${colVar(h.type)}"></div><div style="flex:1"><div class="c-hist-title">${h.t}</div><div class="c-hist-meta">${h.tech} · ${h.d}</div><span class="tag ${typeTagCls(h.type)}">${typeLabel(h.type)}</span><div class="c-hist-km">📍 ${fmtKm(h.km)} <span style="color:var(--purple);font-weight:600;margin-left:8px">🛡️ ${h.verif}% fiable</span></div></div></div>`).join('')}
    </div>`;
  }
  if(page==='entretien'){
    const nextRev=Math.ceil(m.km/6000)*6000+6000;
    const pct=Math.round(((m.km%6000)/6000)*100);
    el.innerHTML=`<div style="padding:14px 14px 0"><div style="font-family:'DM Serif Display',serif;font-size:22px;color:var(--ct);margin-bottom:14px">Plan d'entretien</div></div>
    <div class="c-section">
      <div style="background:#1a1714;border-radius:16px;padding:18px;margin-bottom:14px">
        <div style="font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Prochaine révision</div>
        <div style="font-family:'DM Serif Display',serif;font-size:28px;color:#fff;margin-bottom:4px">${nextRev.toLocaleString('fr-FR')} km</div>
        <div style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:10px">~${(nextRev-m.km).toLocaleString('fr-FR')} km restants</div>
        <div style="height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#22c55e,#eab308);border-radius:3px"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.3);margin-top:5px"><span>${(nextRev-6000).toLocaleString('fr-FR')} km</span><span>${nextRev.toLocaleString('fr-FR')} km</span></div>
      </div>
      ${m.plan.map(op=>{const {s,pct:p,kmLeft}=getOpStatus(op,m.km);const c={urgent:'var(--red)',warning:'var(--yellow)',due:'var(--orange)',ok:'var(--green)',future:'var(--ct3)'}[s];const bg={urgent:'#fff8f8',warning:'#fffdf0',ok:'#f8fef9',due:'#fff8f2',future:var(--ccard)}[s]||'var(--ccard)';return `<div class="c-plan-card" style="border-left:3px solid ${c}">
        <div class="c-plan-header">
          <div class="c-plan-icon" style="background:${c}22">${op.icon}</div>
          <div style="flex:1"><div class="c-plan-name">${op.nom}</div><div class="c-plan-km">${op.tags.join(' · ')}</div></div>
          <div class="c-plan-status" style="background:${c}22;color:${c}">${opStatusLabel(s)}</div>
        </div>
        <div class="c-plan-prog-bg"><div class="c-plan-prog-fill" style="width:${p}%;background:${c}"></div></div>
        <div class="c-plan-detail"><strong>Produit :</strong> ${op.produit} · ${op.tempsH}h · Source constructeur</div>
      </div>`;}).join('')}
    </div>`;
  }
  if(page==='docs'){
    el.innerHTML=`<div style="padding:14px 14px 0"><div style="font-family:'DM Serif Display',serif;font-size:22px;color:var(--ct);margin-bottom:14px">Documents</div></div>
    <div class="c-section">
      ${m.hist.map(h=>`<div class="c-doc-row" onclick="showToast('📄 Ouverture de la facture')"><div class="c-doc-icon" style="background:${({vert:'#e8f5ee',bleu:'#e8eef5',jaune:'#fdf6e0',rouge:'#fde8e8'})[h.type]||'#f4f1ec'}">📄</div><div style="flex:1"><div class="c-doc-name">${h.t}</div><div class="c-doc-date">${h.d} · ${typeLabel(h.type)} <span style="color:var(--purple);font-weight:600">· 🛡️ ${h.verif}%</span></div></div><span style="color:var(--ct3)">›</span></div>`).join('')}
      <div style="background:#1a1714;border-radius:14px;padding:20px;text-align:center;margin-top:14px">
        <div style="font-family:'DM Serif Display',serif;font-size:18px;color:#fff;margin-bottom:4px">QR Code MotoKey</div>
        <div style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:14px">Partagez lors d'une revente</div>
        <div style="width:90px;height:90px;background:#fff;border-radius:10px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:50px">🔲</div>
        <div style="display:flex;gap:8px;justify-content:center">
          <button onclick="showToast('📤 QR Code partagé')" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:9px 16px;color:#fff;font-size:12px;font-weight:600;cursor:pointer">📤 Partager</button>
          <button onclick="showToast('⬇️ QR Code téléchargé')" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:9px 16px;color:#fff;font-size:12px;font-weight:600;cursor:pointer">⬇️ Télécharger</button>
        </div>
      </div>
    </div>`;
  }
}
function switchCPage(p){
  currentCPage=p;
  document.querySelectorAll('.c-page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.c-nav-btn').forEach(x=>x.classList.remove('active'));
  const el=document.getElementById('cpage-'+p);
  const btn=document.getElementById('cnav-'+p);
  if(el)el.classList.add('active');
  if(btn)btn.classList.add('active');
}

/* ════════════════════════════════════════
   MODALS
════════════════════════════════════════ */
function openModal(id){
  const modals={
    addMotoModal:`
      <div class="modal-head"><div><div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900">Nouvelle Moto</div><div style="font-size:12px;color:var(--text3);margin-top:2px">Créer un nouveau dossier numérique</div></div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="f-row"><div class="f-group"><label class="f-label">Marque</label><input class="f-input" placeholder="Yamaha, Honda…"></div><div class="f-group"><label class="f-label">Modèle</label><input class="f-input" placeholder="MT-07, CB750…"></div></div>
        <div class="f-row"><div class="f-group"><label class="f-label">Année</label><input class="f-input" type="number" placeholder="2021"></div><div class="f-group"><label class="f-label">Immatriculation</label><input class="f-input" placeholder="AB-123-CD"></div></div>
        <div class="f-group"><label class="f-label">VIN</label><input class="f-input" placeholder="17 caractères"></div>
        <div class="f-row"><div class="f-group"><label class="f-label">Propriétaire</label><input class="f-input" id="newProprio" placeholder="Nom complet"></div><div class="f-group"><label class="f-label">Kilométrage</label><input class="f-input" type="number" id="newKm" placeholder="0"></div></div>
        <div class="btn-row"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="closeModal();showToast('✅ Dossier numérique créé')">Créer le dossier</button></div>
      </div>`,
    addInterModal:`
      <div class="modal-head"><div><div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900">Nouvelle Intervention</div><div style="font-size:12px;color:var(--text3);margin-top:2px">Synchronisée instantanément sur l'app client</div></div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="f-group"><label class="f-label">Moto concernée</label><select class="f-input f-select" id="interMoto">${DB.motos.map(m=>`<option value="${m.id}">${m.marque} ${m.modele} — ${m.plaque}</option>`).join('')}</select></div>
        <div class="f-group"><label class="f-label">Type d'intervention</label>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
            ${[['vert','🟢 Concession','var(--green)','var(--green-bg)'],['bleu','🔵 Pro validé','var(--blue)','var(--blue-bg)'],['jaune','🟡 Proprio','var(--yellow)','var(--yellow-bg)'],['rouge','🔴 Non effectué','var(--red)','var(--red-bg)']].map(([t,l,c,bg])=>`<div style="background:${bg};border:2px solid ${c};border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:${c}" onclick="window._interType='${t}'">${l}</div>`).join('')}
          </div>
        </div>
        <div class="f-group"><label class="f-label">Description</label><input class="f-input" id="interDesc" placeholder="Vidange, courroie, freins…"></div>
        <div class="f-row"><div class="f-group"><label class="f-label">Kilométrage</label><input class="f-input" type="number" id="interKm"></div><div class="f-group"><label class="f-label">Technicien</label><select class="f-input f-select">${DB.garage.techniciens.map(t=>`<option>${t}</option>`).join('')}</select></div></div>
        <div class="info-ban green"><span>⚡</span>Cette intervention sera <strong>synchronisée instantanément</strong> sur l'application client.</div>
        <div class="btn-row"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveIntervention()">Enregistrer & Sync</button></div>
      </div>`
  };
  document.getElementById('modalContent').innerHTML=modals[id]||'<div class="modal-body">Non trouvé</div>';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target.id==='modalOverlay')closeModal();});

function saveIntervention(){
  const motoId=parseInt(document.getElementById('interMoto').value);
  const desc=document.getElementById('interDesc').value||'Intervention';
  const km=parseInt(document.getElementById('interKm').value)||0;
  const type=window._interType||'bleu';
  const m=DB.motos.find(x=>x.id===motoId);
  if(!m){closeModal();return;}
  const today=new Date();
  const dateStr=`${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;
  m.hist.unshift({t:desc,d:dateStr,km:km||m.km,type,tech:'J.-M. Duval',desc,verif:Math.floor(Math.random()*15+82),isNew:true});
  if(km>m.km)m.km=km;
  m.score=Math.min(100,m.score+(type==='vert'?12:type==='bleu'?8:type==='jaune'?5:-5));
  m.couleur=m.score>=80?'vert':m.score>=60?'bleu':m.score>=40?'jaune':'rouge';
  closeModal();
  const card=document.querySelector(`.moto-row`);
  if(card){card.classList.add('flash');setTimeout(()=>card.classList.remove('flash'),700);}
  showToast(`⚡ Intervention enregistrée · Sync ${m.proprio} ✓`);
  document.getElementById('cNotifDot').style.display='block';
  renderSection(currentGSection);
  if(document.getElementById('clientView').style.display!=='none') renderClientView();
}

/* ════════════════════════════════════════
   TOAST & UTILS
════════════════════════════════════════ */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}
function filterDash(f,el){
  // Visual only filter
  document.querySelectorAll('#dashFilters button').forEach(b=>b.className='btn btn-ghost btn-sm');
  el.className='btn btn-primary btn-sm';
}

   INIT

goSection('dashboard');
transfertStep=1;
</script>
