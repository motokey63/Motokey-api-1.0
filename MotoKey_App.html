<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MotoKey — Garage</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f0f2f5;color:#1a1d23;min-height:100vh;}

/* ── Variables ── */
:root{
  --bg:#f0f2f5;--card:#ffffff;--card2:#f8f9fb;
  --border:#e2e5eb;--border2:#d0d4dc;
  --tx:#1a1d23;--tx2:#5a6172;--tx3:#9ba3b4;
  --acc:#ff6b00;--acc2:#ff8c33;--accbg:#fff4ee;
  --gn:#16a34a;--gnbg:#f0fdf4;--gnbd:#bbf7d0;
  --bl:#2563eb;--blbg:#eff6ff;--blbd:#bfdbfe;
  --yw:#d97706;--ywbg:#fffbeb;--ywbd:#fde68a;
  --rd:#dc2626;--rdbg:#fef2f2;--rdbd:#fecaca;
  --pu:#7c3aed;--pubg:#f5f3ff;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 16px rgba(0,0,0,.1);
}

/* ── Layout ── */
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:60px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--sh);}
.logo{font-size:20px;font-weight:900;color:var(--tx);letter-spacing:.5px;white-space:nowrap;}
.logo em{color:var(--acc);font-style:normal;}
.nav{display:flex;gap:2px;margin-left:8px;}
.nav-btn{padding:7px 14px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--tx2);transition:all .15s;white-space:nowrap;}
.nav-btn:hover{background:var(--bg);color:var(--tx);}
.nav-btn.on{background:var(--accbg);color:var(--acc);font-weight:700;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.api-pill{display:flex;align-items:center;gap:5px;background:var(--gnbg);border:1px solid var(--gnbd);color:var(--gn);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--gn);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.main{max-width:1100px;margin:0 auto;padding:24px 20px;}

/* ── Cards ── */
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);box-shadow:var(--sh);}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:15px;font-weight:700;color:var(--tx);}
.card-body{padding:20px;}

/* ── Boutons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--acc);color:#fff;} .btn-primary:hover{background:var(--acc2);}
.btn-ghost{background:var(--card);color:var(--tx2);border:1px solid var(--border);} .btn-ghost:hover{background:var(--bg);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-danger{background:var(--rdbg);color:var(--rd);border:1px solid var(--rdbd);}

/* ── Score Badge ── */
.score-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.score-vert{background:var(--gnbg);color:var(--gn);border:1px solid var(--gnbd);}
.score-bleu{background:var(--blbg);color:var(--bl);border:1px solid var(--blbd);}
.score-jaune{background:var(--ywbg);color:var(--yw);border:1px solid var(--ywbd);}
.score-rouge{background:var(--rdbg);color:var(--rd);border:1px solid var(--rdbd);}

/* ── Moto Cards ── */
.moto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.moto-card{background:var(--card);border-radius:14px;border:1px solid var(--border);box-shadow:var(--sh);padding:18px;cursor:pointer;transition:all .2s;}
.moto-card:hover{transform:translateY(-2px);box-shadow:var(--sh2);border-color:var(--acc);}
.moto-card.active{border-color:var(--acc);box-shadow:0 0 0 3px var(--accbg);}
.mc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.mc-mk{font-size:17px;font-weight:800;color:var(--tx);}
.mc-md{font-size:13px;color:var(--tx2);margin-top:1px;}
.mc-score{text-align:center;}
.mc-score-num{font-size:28px;font-weight:900;line-height:1;}
.mc-score-lbl{font-size:9px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;}
.mc-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.mc-tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg);color:var(--tx2);padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500;}
.mc-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.mc-bar-fill{height:100%;border-radius:2px;transition:width .5s;}
.mc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.mc-own{font-size:12px;color:var(--tx3);}

/* ── Stats Row ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;box-shadow:var(--sh);}
.stat-lbl{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600;}
.stat-val{font-size:26px;font-weight:900;color:var(--tx);}
.stat-sub{font-size:11px;color:var(--tx3);margin-top:3px;}

/* ── Intervention List ── */
.inter-list{display:flex;flex-direction:column;gap:8px;}
.inter-item{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px 14px;}
.inter-bar{width:3px;min-height:40px;border-radius:2px;align-self:stretch;}
.inter-info{flex:1;}
.inter-title{font-size:14px;font-weight:600;color:var(--tx);}
.inter-meta{font-size:12px;color:var(--tx3);margin-top:2px;}
.inter-right{text-align:right;}
.inter-km{font-size:12px;color:var(--tx2);font-weight:500;}
.inter-fraud{font-size:11px;color:var(--pu);font-weight:600;margin-top:2px;}
.inter-new{background:var(--gnbg);border-color:var(--gnbd);}

/* ── Plan Entretien ── */
.plan-list{display:flex;flex-direction:column;gap:8px;}
.plan-item{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px 14px;border-left:3px solid var(--border2);}
.plan-icon{font-size:20px;width:28px;text-align:center;}
.plan-info{flex:1;}
.plan-name{font-size:13px;font-weight:600;color:var(--tx);}
.plan-detail{font-size:11px;color:var(--tx3);margin-top:2px;}
.plan-bar{width:100px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px;}
.plan-bar-fill{height:100%;border-radius:2px;}
.plan-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.ps-urgent{background:var(--rdbg);color:var(--rd);}
.ps-warning{background:var(--ywbg);color:var(--yw);}
.ps-ok{background:var(--gnbg);color:var(--gn);}
.ps-due{background:#fff7ed;color:#c2410c;}
.ps-future{background:var(--bg);color:var(--tx3);}

/* ── Pneus ── */
.tire-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.tire-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;position:relative;overflow:hidden;}
.tire-card.reco{border-color:var(--acc);box-shadow:0 0 0 2px var(--accbg);}
.tire-reco-badge{position:absolute;top:10px;right:10px;background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.tire-brand{font-size:11px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.tire-name{font-size:17px;font-weight:800;color:var(--tx);margin:3px 0;}
.tire-type{font-size:12px;color:var(--tx2);margin-bottom:12px;}
.tire-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;}
.tire-stat{text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px;}
.tire-stat-val{font-size:16px;font-weight:800;color:var(--tx);}
.tire-stat-lbl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.tire-prices{display:flex;gap:8px;margin-top:10px;}
.tire-price{flex:1;background:var(--bg);border-radius:8px;padding:8px;text-align:center;}
.tire-price-val{font-size:15px;font-weight:800;color:var(--tx);}
.tire-price-lbl{font-size:10px;color:var(--tx3);}

/* ── Devis ── */
.devis-table{width:100%;border-collapse:collapse;font-size:13px;}
.devis-table th{background:var(--bg);padding:9px 12px;text-align:left;font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;font-weight:600;border-bottom:1px solid var(--border);}
.devis-table td{padding:10px 12px;border-bottom:1px solid var(--border2);}
.devis-table tr:last-child td{border-bottom:none;}
.devis-table tr:hover td{background:var(--bg);}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:520px;box-shadow:0 24px 64px rgba(0,0,0,.2);overflow:hidden;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);}
.modal-title{font-size:17px;font-weight:800;color:var(--tx);}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:16px;color:var(--tx2);display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--border);}
.modal-body{padding:22px;display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow-y:auto;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.field input,.field select{width:100%;padding:10px 13px;border-radius:9px;border:1.5px solid var(--border);font-size:14px;color:var(--tx);background:#fff;outline:none;transition:border .15s;}
.field input:focus,.field select:focus{border-color:var(--acc);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px;border-top:1px solid var(--border);background:var(--bg);}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;right:20px;background:#1a1d23;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;display:flex;align-items:center;gap:8px;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);max-width:350px;}
.toast.show{transform:translateY(0);opacity:1;}

/* ── Type Selector ── */
.type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.type-btn{padding:10px;border-radius:10px;border:2px solid transparent;cursor:pointer;text-align:center;font-size:12px;font-weight:700;transition:all .2s;opacity:.5;}
.type-btn.sel{opacity:1;transform:scale(1.03);}
.type-vert{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0;}
.type-bleu{background:#eff6ff;color:#2563eb;border-color:#bfdbfe;}
.type-jaune{background:#fffbeb;color:#d97706;border-color:#fde68a;}
.type-rouge{background:#fef2f2;color:#dc2626;border-color:#fecaca;}
.type-btn.sel.type-vert{border-color:#16a34a;box-shadow:0 0 0 3px #dcfce7;}
.type-btn.sel.type-bleu{border-color:#2563eb;box-shadow:0 0 0 3px #dbeafe;}
.type-btn.sel.type-jaune{border-color:#d97706;box-shadow:0 0 0 3px #fef3c7;}
.type-btn.sel.type-rouge{border-color:#dc2626;box-shadow:0 0 0 3px #fee2e2;}

/* ── Section header ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-size:21px;font-weight:800;color:var(--tx);}
.sec-sub{font-size:13px;color:var(--tx3);margin-top:2px;}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--tx3);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:700;color:var(--tx2);margin-bottom:6px;}
.empty-sub{font-size:13px;}

/* ── Fiche Moto ── */
.fiche-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.info-row{display:flex;flex-direction:column;gap:3px;padding:12px;background:var(--bg);border-radius:9px;}
.info-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.info-val{font-size:14px;font-weight:700;color:var(--tx);}

/* ── Score Circle ── */
.score-circle{position:relative;width:80px;height:80px;}
.score-circle svg{transform:rotate(-90deg);}
.score-circle-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.sc-num{font-size:22px;font-weight:900;line-height:1;}
.sc-lbl{font-size:9px;color:var(--tx3);letter-spacing:1px;}

/* ── Responsive ── */
@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .fiche-grid{grid-template-columns:1fr;}
  .nav-btn span{display:none;}
  .topbar{padding:0 12px;}
  .main{padding:16px 12px;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar" id="topbar">
  <div class="logo">MOTO<em>KEY</em></div>
  <nav class="nav" id="mainNav">
    <button class="nav-btn on" onclick="goSec('dashboard',this)" data-sec="dashboard">🏠 Tableau de bord</button>
    <button class="nav-btn" onclick="goSec('motos',this)" data-sec="motos">🏍️ Motos</button>
    <button class="nav-btn" onclick="goSec('entretien',this)" data-sec="entretien">🔧 Entretien</button>
    <button class="nav-btn" onclick="goSec('pneus',this)" data-sec="pneus">🔵 Pneus</button>
    <button class="nav-btn" onclick="goSec('devis',this)" data-sec="devis">💶 Devis</button>
  </nav>
  <div class="topbar-right" id="apiStatus"></div>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="mainContent"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

var curSec = 'dashboard';
var curMoto = 1;
var window_itype = 'bleu';
var searchQuery = '';

/* ══════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════ */
function getMoto(id){ return G.motos.find(function(m){return m.id==id;})||G.motos[0]; }
function colHex(c){ return {vert:'#16a34a',bleu:'#2563eb',jaune:'#d97706',rouge:'#dc2626'}[c]||'#888'; }
function colClass(c){ return 'score-'+c; }
function fmtKm(n){ return (n||0).toLocaleString('fr-FR')+' km'; }
function fmtEur(n){ return parseFloat(n||0).toFixed(2).replace('.',',')+' €'; }
function planStatut(kmlast,kmi,kmActuel){
  var since=kmActuel-kmlast, pct=kmi>0?Math.min(100,Math.round(since/kmi*100)):0;
  var left=Math.max(0,kmi-since);
  var s=pct>=100?'urgent':pct>=80?'warning':pct>=40?'due':kmlast>0?'ok':'future';
  return {pct,left,s};
}
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._toast);
  window._toast=setTimeout(function(){t.classList.remove('show');},3200);
}

/* ══════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════ */
function goSec(sec, btn){
  curSec = sec;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('on');});
  if(btn) btn.classList.add('on');
  else {
    var b=document.querySelector('[data-sec='+sec+']');
    if(b) b.classList.add('on');
  }
  render();
}

function render(){
  var el = document.getElementById('mainContent');
  if(curSec==='dashboard') el.innerHTML = renderDashboard();
  else if(curSec==='motos') el.innerHTML = renderMotos();
  else if(curSec==='entretien') el.innerHTML = renderEntretien();
  else if(curSec==='pneus') el.innerHTML = renderPneus();
  else if(curSec==='devis') el.innerHTML = renderDevis();
}

/* ══════════════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════════════ */
function renderDashboard(){
  var total=G.motos.length;
  var parCouleur={vert:0,bleu:0,jaune:0,rouge:0};

  /* En-tête */
  html+='<div class="sec-header"><div><div class="sec-title">Tableau de bord</div><div class="sec-sub">Vue d\'ensemble du parc — '+G.garage.nom+'</div></div>';

  html+='<span class="score-badge score-vert">🟢 '+parCouleur.vert+'</span>';
  html+='<span class="score-badge score-bleu">🔵 '+parCouleur.bleu+'</span>';

        return m.pl.toLowerCase().includes(q)

  html+='placeholder="Rechercher par immatriculation, VIN, nom…" ';
  html+='value="'+searchQuery.replace(/"/g,'&quot;')+'" ';
  html+='oninput="searchQuery=this.value;render();setTimeout(function(){var el=document.getElementById(\'searchInput\');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},0)" ';
  html+='style="width:100%;padding:11px 14px 11px 44px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;color:var(--tx);background:#fff;outline:none;box-shadow:var(--sh)" ';

    html+='</div>';
  }
  html+='</div>';

  html+='<div class="moto-grid">';

  if(q && motosFiltrees.length===0){
    html+='<div style="grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--tx3)">';
    html+='<div style="font-size:40px;margin-bottom:12px">🔍</div>';

    html+='<div style="font-size:13px">Aucun résultat pour "'+searchQuery+'"</div>';

  motosFiltrees.forEach(function(m){

    html+='<div class="moto-card'+(curMoto==m.id?' active':'')+'" onclick="curMoto='+m.id+';goSec(\'entretien\',document.querySelector(\'[data-sec=entretien]\'))">';

    html+='</div>';
    html+='<div class="mc-meta">';
    html+='<span class="mc-tag">📍 '+fmtKm(m.km)+'</span>';
    html+='<span class="mc-tag">👤 '+m.own+'</span>';
    html+='<span class="score-badge score-'+m.col+'">'+{vert:'✅ Excellent',bleu:'🔵 Bon',jaune:'🟡 Moyen',rouge:'🔴 Insuffisant'}[m.col]+'</span>';

  if(!q){

  html+='</div>';

  html+='<div style="margin-top:20px"><div class="sec-header"><div class="sec-title">Dernières interventions</div>';
  html+='<button class="btn btn-ghost btn-sm" onclick="goSec(\'entretien\',document.querySelector(\'[data-sec=entretien]\'))">Voir tout →</button></div>';

  G.motos.forEach(function(m){(m.hist||[]).forEach(function(h){allInters.push(Object.assign({},h,{motoNm:m.mk+' '+m.md,motoId:m.id}));});});

    html+='<div class="inter-bar" style="background:'+col+'"></div>';

  if(allInters.length===0) html+='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Aucune intervention</div></div>';

  return html;

function renderEntretien(){

  html+='<div class="sec-header">';
  html+='<div><select style="font-size:16px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--tx);outline:none" onchange="curMoto=parseInt(this.value);render()">';

    html+='<div class="plan-info"><div class="plan-name">'+op.nm+'</div>';
    html+='<div class="plan-detail">'+op.prod+' · '+op.th+'h · Tous les '+fmtKm(op.kmi)+'</div>';
    html+='<div class="plan-bar"><div class="plan-bar-fill" style="width:'+st.pct+'%;background:'+col+'"></div></div>';
    html+='<div style="font-size:11px;color:var(--tx3);margin-top:3px">Prochain à '+prochain.toLocaleString('fr-FR')+' km';
    if(st.s!=='urgent') html+=' · encore '+fmtKm(st.left);
    html+='</div></div>';
    html+='<div><span class="plan-status '+stClass+'">'+stLbl+'</span></div>';
    html+='</div>';
  });

  if(m.plan.length===0) html+='<div class="empty"><div class="empty-icon">🔧</div><div class="empty-title">Plan d\'entretien non disponible</div></div>';
  html+='</div></div></div>';

  /* Historique compact */
  html+='<div class="card" style="margin-top:14px"><div class="card-head"><div class="card-title">📋 Interventions récentes</div>';
  html+='<button class="btn btn-ghost btn-sm" onclick="goSec(\'motos\',document.querySelector(\'[data-sec=motos]\'))">Voir fiche →</button></div>';

    var hcol=colHex(h.ty);

    html+='<div class="inter-info"><div class="inter-title">'+h.t+'</div><div class="inter-meta">'+h.tech+' · '+h.d+'</div></div>';
    html+='<div class="inter-right"><div class="inter-km">'+fmtKm(h.km)+'</div><div class="inter-fraud">🛡️ '+h.vf+'%</div></div>';

  return html;

function renderDevis(){

  var html='';

  html+='</select></div>';

  html+='<div style="display:grid;grid-template-columns:1fr 340px;gap:14px">';

  /* Lignes */
  html+='<div class="card"><div class="card-head"><div class="card-title">Lignes du devis</div></div>';
  html+='<div style="overflow:auto"><table class="devis-table">';
  html+='<thead><tr><th>Description</th><th>Qté</th><th>PU HT</th><th>Total HT</th></tr></thead><tbody>';
  lines.forEach(function(l){
    var icon={mo:'🔧',fluide:'🛢️',piece:'🔩'}[l.type]||'📦';
    html+='<tr><td>'+icon+' '+l.desc+'</td><td>'+l.qty+(l.type==='mo'?' h':' u')+'</td><td>'+fmtEur(l.pu)+'</td><td style="font-weight:700">'+fmtEur(l.total)+'</td></tr>';
  });
  html+='</tbody></table></div></div>';

  /* Totaux */
  html+='<div class="card"><div class="card-head"><div class="card-title">Récapitulatif</div></div><div class="card-body">';
  [['Sous-total HT',fmtEur(sousTotal)],['Remise fidélité 10%','- '+fmtEur(remise)],['Base HT',fmtEur(base)],['TVA '+G.garage.tva+'%',fmtEur(tva)]].forEach(function(r){
    html+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border2);font-size:13px"><span style="color:var(--tx2)">'+r[0]+'</span><span style="font-weight:600">'+r[1]+'</span></div>';
  });
  html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;margin-top:8px;background:var(--tx);border-radius:10px">';
  html+='<span style="color:rgba(255,255,255,.7);font-size:14px;font-weight:600">TOTAL TTC</span>';
  html+='<span style="color:var(--acc);font-size:20px;font-weight:900">'+fmtEur(ttc)+'</span></div>';
  html+='<button class="btn btn-primary" style="width:100%;margin-top:12px;justify-content:center" onclick="toast(\'✅ Devis validé · Facture générée\')">✅ Valider → Facture PDF</button>';
  html+='</div></div>';
  html+='</div>';
  return html;
}

   MODALS
══════════════════════════════════════════════════════ */
function openModal(id){
  var box=document.getElementById('modalBox');
  var m=getMoto(curMoto);
  if(id==='addMoto'){
    box.innerHTML='<div class="modal-head"><div class="modal-title">🏍️ Nouvelle moto</div><button class="modal-close" onclick="closeModal()">✕</button></div>'+
    '<div class="modal-body">'+
    '<div class="field-row"><div class="field"><label>Marque</label><input id="nm_marque" placeholder="Yamaha, Honda…"></div><div class="field"><label>Modèle</label><input id="nm_modele" placeholder="MT-07, CB750…"></div></div>'+
    '<div class="field-row"><div class="field"><label>Année</label><input id="nm_annee" type="number" placeholder="2024"></div><div class="field"><label>Immatriculation</label><input id="nm_plaque" placeholder="AB-123-CD"></div></div>'+
    '<div class="field"><label>VIN (17 caractères)</label><input id="nm_vin" placeholder="ex: JYARN22E00A000001"></div>'+
    '<div class="field-row"><div class="field"><label>Propriétaire</label><input id="nm_proprio" placeholder="Nom complet"></div><div class="field"><label>Email</label><input id="nm_email" type="email" placeholder="client@email.com"></div></div>'+
    '<div class="field-row"><div class="field"><label>Téléphone</label><input id="nm_tel" placeholder="06 XX XX XX XX"></div><div class="field"><label>Kilométrage</label><input id="nm_km" type="number" placeholder="0"></div></div>'+
    '</div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveMoto()">Créer le dossier</button></div>';
  }
  else if(id==='addInter'){
    window_itype='bleu';
    var motoOptions=G.motos.map(function(mo){return '<option value="'+mo.id+'"'+(mo.id==curMoto?' selected':'')+'>'+mo.mk+' '+mo.md+' — '+mo.pl+'</option>';}).join('');
    var techOptions=G.garage.techniciens.map(function(t){return '<option>'+t+'</option>';}).join('');
    box.innerHTML='<div class="modal-head"><div class="modal-title">⚡ Nouvelle intervention</div><button class="modal-close" onclick="closeModal()">✕</button></div>'+
    '<div class="modal-body">'+
    '<div class="field"><label>Moto</label><select id="im" class="field select">'+motoOptions+'</select></div>'+
    '<div class="field"><label>Type d\'intervention</label>'+
    '<div class="type-grid">'+
    '<div id="itype_vert" class="type-btn type-vert" onclick="selectType(\'vert\')">🟢 Concession<br><span style="font-size:10px;opacity:.7">+12 pts</span></div>'+
    '<div id="itype_bleu" class="type-btn type-bleu sel" onclick="selectType(\'bleu\')">🔵 Pro validé<br><span style="font-size:10px;opacity:.7">+8 pts</span></div>'+
    '<div id="itype_jaune" class="type-btn type-jaune" onclick="selectType(\'jaune\')">🟡 Propriétaire<br><span style="font-size:10px;opacity:.7">+5 pts</span></div>'+
    '<div id="itype_rouge" class="type-btn type-rouge" onclick="selectType(\'rouge\')">🔴 Non effectué<br><span style="font-size:10px;opacity:.7">-5 pts</span></div>'+
    '</div></div>'+
    '<div class="field"><label>Description</label><input id="idesc" placeholder="Vidange, courroie, freins…"></div>'+
    '<div class="field-row">'+
    '<div class="field"><label>Kilométrage</label><input id="ikm" type="number" placeholder="'+m.km+'"></div>'+
    '<div class="field"><label>Technicien</label><select id="itech">'+techOptions+'</select></div>'+
    '</div>'+
    '<div style="background:var(--blbg);border:1px solid var(--blbd);border-radius:9px;padding:10px 12px;font-size:12px;color:var(--bl)">⚡ Synchronisée instantanément sur l\'app client</div>'+
    '</div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveInter()">Enregistrer</button></div>';

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}

function selectType(type){
  window_itype=type;
  ['vert','bleu','jaune','rouge'].forEach(function(t){
    var el=document.getElementById('itype_'+t);
    if(el) el.classList.remove('sel');
  });
  var sel=document.getElementById('itype_'+type);
  if(sel) sel.classList.add('sel');
}

/* ══════════════════════════════════════════════════════
   API
══════════════════════════════════════════════════════ */
var API_URL=(window.location.protocol==='file:')
  ?'https://motokey-api-10-production.up.railway.app'
  :window.location.origin;
var API_TOKEN='';

async function apiLogin(email,password,role){
  try{
    var r=await fetch(API_URL+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,role})});
    var data=await r.json();
    if(data.success){API_TOKEN=data.data.token;return data.data;}
  }catch(e){console.warn('API offline');}
}

async function apiCall(method,path,body){
  try{
    var opts={method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_TOKEN}};
    if(body) opts.body=JSON.stringify(body);
    var r=await fetch(API_URL+path,opts);
    return await r.json();
  }catch(e){return null;}
}

/* Chargement des vraies motos depuis l'API */
async function loadFromAPI(){
  var res=await apiCall('GET','/motos');
  if(res&&res.success&&res.data&&res.data.motos&&res.data.motos.length>0){
    var apiMotos=res.data.motos;
    var mapped=await Promise.all(apiMotos.map(async function(mo){
      var ints=await apiCall('GET','/motos/'+mo.id+'/interventions');
      var hist=(ints&&ints.success&&ints.data&&ints.data.interventions)||[];
      return {
        id:mo.id, mk:mo.marque, md:mo.modele, yr:mo.annee,
        pl:mo.plaque, vin:mo.vin, km:mo.km, own:mo.client_nom||mo.client||'—',
        col:mo.couleur_dossier||'rouge', sc:mo.score||0,
        hist:hist.map(function(h){return {t:h.titre,d:h.date_intervention,km:h.km,ty:h.type,tech:h.technicien||'—',desc:h.description||'',vf:h.score_confiance||0};}),
        plan:[]
      };
    }));
    G.motos=mapped;
    curMoto=mapped[0]?mapped[0].id:curMoto;
    render();
    toast('✅ '+mapped.length+' moto(s) chargée(s) depuis la base');
  }
}

/* Indicateur API */
(async function(){
  try{
    var r=await fetch(API_URL+'/');
    if(r.ok){
      var pill=document.createElement('div');
      pill.className='api-pill';
      pill.innerHTML='<div class="api-dot"></div>API Railway ✓';
      document.getElementById('apiStatus').appendChild(pill);
      var sess=await apiLogin('garage@motokey.fr','motokey2026','garage');
      if(sess) await loadFromAPI();
    }
  }catch(e){}
})();

/* ══════════════════════════════════════════════════════
   SAUVEGARDE
══════════════════════════════════════════════════════ */
async function saveMoto(){
  var marque=(document.getElementById('nm_marque')||{value:''}).value.trim();
  var modele=(document.getElementById('nm_modele')||{value:''}).value.trim();
  var annee=parseInt((document.getElementById('nm_annee')||{value:2024}).value)||2024;
  var plaque=(document.getElementById('nm_plaque')||{value:''}).value.trim().toUpperCase();
  var vin=(document.getElementById('nm_vin')||{value:''}).value.trim().toUpperCase();
  var proprio=(document.getElementById('nm_proprio')||{value:''}).value.trim();
  var email=(document.getElementById('nm_email')||{value:''}).value.trim();
  var tel=(document.getElementById('nm_tel')||{value:''}).value.trim();
  var km=parseInt((document.getElementById('nm_km')||{value:0}).value)||0;
  if(!marque||!modele||!plaque||!vin||!proprio){toast('⚠️ Champs requis : marque, modèle, plaque, VIN, propriétaire');return;}
  if(vin.length!==17){toast('⚠️ VIN = 17 caractères exactement');return;}
  var btn=document.querySelector('#modalBox .btn-primary');
  if(btn){btn.textContent='Création…';btn.disabled=true;}
  var result=await apiCall('POST','/motos',{marque,modele,annee,plaque,vin,km,client_nom:proprio,client_email:email||null,client_tel:tel||null});
  if(result&&result.success){
    var nm=result.data.moto,nc=result.data.client;
    G.motos.push({id:nm.id,mk:nm.marque,md:nm.modele,yr:nm.annee,pl:nm.plaque,vin:nm.vin,km:nm.km,own:nc?nc.nom:proprio,col:'rouge',sc:0,hist:[],plan:[]});
    closeModal();
    toast('✅ '+marque+' '+modele+' créée pour '+proprio);
    render();
  }else{
    toast('❌ '+(result&&result.error?result.error.message:'Erreur API'));
    if(btn){btn.textContent='Créer le dossier';btn.disabled=false;}
  }
}

async function saveInter(){
  var motoId=(document.getElementById('im')||{value:curMoto}).value||curMoto;
  var desc=(document.getElementById('idesc')||{value:'Intervention'}).value||'Intervention';
  var km=parseInt((document.getElementById('ikm')||{value:0}).value)||0;
  var ty=window_itype||'bleu';
  var btn=document.querySelector('#modalBox .btn-primary');
  if(btn){btn.textContent='Enregistrement…';btn.disabled=true;}
  var result=await apiCall('POST','/motos/'+motoId+'/interventions',{type:ty,titre:desc,description:desc,km:km,montant_ht:0});
  var m=G.motos.find(function(x){return x.id==motoId;})||getMoto(curMoto);
  var today=new Date();
  var ds=String(today.getDate()).padStart(2,'0')+'/'+String(today.getMonth()+1).padStart(2,'0')+'/'+today.getFullYear();
  if(result&&result.success){
    m.hist.unshift({t:desc,d:ds,km:km||m.km,ty:ty,tech:'J.-M. Duval',desc:desc,vf:result.data.intervention.score_confiance||85,isN:true});
    if(km>m.km) m.km=km;
    m.sc=result.data.nouveau_score||m.sc;
    m.col=result.data.nouvelle_couleur||m.col;
    closeModal();
    toast('⚡ Intervention enregistrée · Score mis à jour');
  }else{
    m.hist.unshift({t:desc,d:ds,km:km||m.km,ty:ty,tech:'J.-M. Duval',desc:desc,vf:85,isN:true});
    if(km>m.km) m.km=km;
    var pts={vert:12,bleu:8,jaune:5,rouge:-5}[ty]||0;
    m.sc=Math.max(0,Math.min(100,m.sc+pts));
    if(m.km<10000&&m.sc<70) m.sc=Math.min(100,m.sc+20);
    m.col=m.sc>=80?'vert':m.sc>=60?'bleu':m.sc>=40?'jaune':'rouge';
    closeModal();
    toast('⚡ Intervention enregistrée (mode local)');
  }
  render();
}

render();
