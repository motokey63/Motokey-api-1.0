name: Échéances Calendaires Consommables Cron
on:
  schedule:
    - cron: '15 6 * * *'   # 06:15 UTC ≈ 08:15 Europe/Paris — décalé 15 min après maintenance-alerts.yml
  workflow_dispatch: {}
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call echeances-calendaires-consommables cron endpoint
        run: |
          curl --fail -X POST "https://motokey11-production.up.railway.app/cron/echeances-calendaires-consommables" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
